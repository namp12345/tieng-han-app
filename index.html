<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>K-Tour Guide v6</title>
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="top-shell">
      <div class="brand-row">
        <div>
          <p class="brand-title">한국어 HDV v6</p>
          <p class="brand-sub">Cơ bản → Nâng cao · Từ transcript thực tế</p>
        </div>
        <span class="clock-badge" id="clockBadge">--:--</span>
      </div>
      <nav class="top-tabs" aria-label="Điều hướng học">
        <button class="tab active" type="button" data-view="learn">Học</button>
        <button class="tab" type="button" data-view="quiz">Quiz</button>
        <button class="tab" type="button" data-view="review">Ôn tập</button>
        <button class="tab" type="button" data-view="stats">Thống kê</button>
      </nav>
    </section>

    <header class="app-header">
      <p class="eyebrow">Tiếng Hàn thực chiến cho HDV</p>
      <h1>K-Tour Guide v6</h1>
      <p class="subtitle">Đà Nẵng · Hội An · Bà Nà · Linh Ứng</p>
    </header>

    <section class="controls">
      <label class="search-wrap" for="searchInput">
        <span>🔎</span>
        <input id="searchInput" type="search" placeholder="Tìm theo tiếng Hàn, nghĩa Việt, phát âm..." autocomplete="off">
      </label>

      <div class="filter-row">
        <select id="topicFilter" aria-label="Lọc theo chủ đề"></select>
        <button id="randomBtn" class="btn ghost" type="button">Học ngẫu nhiên</button>
      </div>

      <div class="quick-row">
        <button id="allBtn" class="chip active" type="button">Tất cả</button>
        <button id="favoriteBtn" class="chip" type="button">Yêu thích</button>
        <button id="hardBtn" class="chip" type="button">Cụm từ khó</button>
      </div>
    </section>

    <section class="progress-card" aria-live="polite">
      <div><strong id="progressText">0/0 đã học</strong></div>
      <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
      <p id="statsText">Yêu thích: 0 · Khó: 0</p>
    </section>

    <section id="flashcardList" class="card-list" aria-live="polite"></section>

    <template id="cardTemplate">
      <article class="flashcard">
        <div class="card-top">
          <span class="topic-pill"></span>
          <button class="favorite-toggle" type="button" aria-label="Đánh dấu yêu thích">☆</button>
        </div>

        <button class="flip-face front" type="button">
          <p class="ko"></p>
          <p class="hint">Chạm để xem nghĩa &amp; ghi chú</p>
        </button>

        <div class="back hidden">
          <p><strong>Nghĩa:</strong> <span class="vi"></span></p>
          <p><strong>Phát âm:</strong> <span class="roman"></span></p>
          <p class="breakdown-row hidden"><strong>Tách từ:</strong> <span class="breakdown"></span></p>
          <p class="root-row hidden"><strong>Từ gốc:</strong> <span class="root"></span></p>
          <p class="note-row hidden"><strong>Ghi chú:</strong> <span class="note"></span></p>

          <section class="word-analysis">
            <h3>Chạm từng từ để nghe và học gốc từ</h3>
            <p class="analysis-tip">Mẹo nhớ: học theo cụm → chạm từng từ → nghe chậm 2 lần.</p>
            <div class="word-analysis-list"></div>
          </section>
          <div class="actions">
            <button class="speak-btn" data-rate="1" type="button">🔊 Nghe</button>
            <button class="speak-btn" data-rate="0.75" type="button">🐢 Nghe chậm</button>
          </div>
          <div class="study-actions">
            <button class="learned-btn" type="button">Đã nhớ</button>
            <button class="hard-btn" type="button">Đánh dấu khó</button>
          </div>
          <div class="record-actions">
            <button class="record-btn" type="button">🎙️ Ghi âm</button>
            <button class="stop-record-btn" type="button" disabled>⏹️ Dừng</button>
            <button class="play-record-btn" type="button">▶️ Nghe giọng tôi</button>
            <button class="delete-record-btn" type="button">🗑️ Xóa</button>
          </div>
          <p class="record-status">Chưa có bản ghi âm cá nhân.</p>
        </div>
      </article>
    </template>
  </main>

  <script src="phrases.js"></script>
  <script src="app.js"></script>
</body>
</html>
