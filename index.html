<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>K-Tour Guide v6</title>
  <meta name="theme-color" content="#1E4ED8">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>Học tiếng Hàn thực chiến cho HDV</h1>
      <p>Đà Nẵng · Hội An · Bà Nà · Linh Ứng</p>
    </header>

    <nav class="top-nav">
      <button class="nav-tab active" data-view="learn" type="button">Học</button>
      <button class="nav-tab" data-view="quiz" type="button">Quiz</button>
      <button class="nav-tab" data-view="review" type="button">Ôn tập</button>
      <button class="nav-tab" data-view="stats" type="button">Thống kê</button>
    </nav>

    <section class="controls" id="controlPanel">
      <input id="searchInput" type="search" placeholder="Tìm cụm từ...">
      <div class="control-row">
        <select id="topicFilter"></select>
        <button id="randomBtn" type="button">Ngẫu nhiên</button>
      </div>
      <div class="control-row compact">
        <button id="allBtn" class="chip active" type="button">Tất cả</button>
        <button id="favoriteBtn" class="chip" type="button">Yêu thích</button>
        <button id="hardBtn" class="chip" type="button">Khó</button>
      </div>
    </section>

    <section class="progress" id="progressPanel">
      <strong id="progressText">0/0 đã học</strong>
      <div class="track"><div id="progressBar"></div></div>
      <p id="statsText">Yêu thích: 0 · Khó: 0</p>
    </section>

    <section id="viewRoot"></section>

    <template id="flashcardTemplate">
      <article class="FlashcardSentence">
        <div class="card-inner">
          <section class="FlashcardFront" aria-label="Mặt trước flashcard">
            <div class="front-image-wrap">
              <div class="SemanticImage" data-image></div>
              <span class="topic-chip" data-topic></span>
            </div>
            <p class="korean" data-korean></p>
            <p class="roman" data-roman></p>
            <p class="vietnamese" data-vietnamese></p>
            <button class="flip-btn" type="button" data-flip>Lật thẻ</button>
          </section>

          <section class="FlashcardBack" aria-label="Mặt sau flashcard">
            <div class="back-head">
              <p class="back-title" data-korean-back></p>
              <button class="flip-btn" type="button" data-flip>Quay lại</button>
            </div>

            <div class="back-tabs">
              <button class="mini-tab active" data-tab="analysis" type="button">Phân tích</button>
              <button class="mini-tab" data-tab="similar" type="button">Mẫu tương tự</button>
              <button class="mini-tab" data-tab="speak" type="button">Luyện nói</button>
            </div>

            <div class="tab-body" data-panel="analysis">
              <div class="AnalysisList" data-analysis></div>
              <div class="back-block"><strong>Nghĩa tự nhiên:</strong> <span data-natural></span></div>
              <div class="back-block"><strong>Dùng khi nào:</strong> <span data-usage></span></div>
              <div class="back-block"><strong>Mẹo nhớ:</strong> <span data-memory></span></div>
            </div>

            <div class="tab-body hidden" data-panel="similar">
              <ul class="similar-list" data-similar></ul>
            </div>

            <div class="tab-body hidden" data-panel="speak">
              <div class="ActionButtonGrid">
                <button type="button" data-action="speak-normal">Nghe</button>
                <button type="button" data-action="speak-slow">Nghe chậm</button>
                <button type="button" data-action="record">Ghi âm</button>
                <button type="button" data-action="play-record">Nghe giọng tôi</button>
                <button type="button" data-action="learned">Đã nhớ</button>
                <button type="button" data-action="hard">Đánh dấu khó</button>
              </div>
              <button class="delete-record hidden" type="button" data-action="delete-record">Xóa bản ghi</button>
              <p class="record-status" data-record-status>Chưa có bản ghi âm cá nhân.</p>
            </div>
          </section>
        </div>
      </article>
    </template>
  </main>

  <script src="phrases.js"></script>
  <script src="app.js"></script>
</body>
</html>
