<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#c8102e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="한국어 HDV">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>한국어 HDV v4</title>
<style>
:root {
  --bg: #0d0d14;
  --bg2: #13131f;
  --bg3: #1a1a2e;
  --card: #16213e;
  --card2: #1a1a35;
  --red: #e8112d;
  --red2: #ff2d48;
  --blue: #0047ab;
  --blue2: #1a6eff;
  --gold: #ffd700;
  --gold2: #ffec6e;
  --green: #00c896;
  --orange: #ff7c2e;
  --text: #f0f0f8;
  --text2: #9898b8;
  --text3: #5c5c78;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --radius: 14px;
  --radius-sm: 8px;
  --known: #1a2e1a;
  --known-border: #00c896;
  --done: #1a1a2e;
  --done-border: #1a6eff;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body {
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overscroll-behavior: none;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── Header ── */
.app-header {
  background: linear-gradient(135deg, #1a0008 0%, #000824 100%);
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  safe-area-inset-top: env(safe-area-inset-top);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--red), #6b0016);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 900; color: var(--gold);
  font-family: 'Apple SD Gothic Neo', sans-serif;
}
.logo-text { font-size: 15px; font-weight: 700; color: var(--text); }
.logo-sub { font-size: 10px; color: var(--text2); }
.header-right { display: flex; align-items: center; gap: 10px; }
.clock {
  background: var(--card);
  border: 1px solid var(--border2);
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  color: var(--gold);
  font-variant-numeric: tabular-nums;
}

/* ── Tab Bar ── */
.tab-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 4px;
  gap: 3px;
}
.tab-item {
  padding: 8px 4px;
  text-align: center;
  border-radius: 9px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 11px;
  color: var(--text2);
  user-select: none;
}
.tab-item.active {
  background: linear-gradient(135deg, var(--red), #7a000e);
  color: white;
  font-weight: 600;
}
.tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

/* ── Main content ── */
.main { padding: 12px 14px; max-width: 600px; margin: 0 auto; }

/* ── Slot bar ── */
.slot-bar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-bottom: 14px;
}
.slot-chip {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 8px 3px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 10px;
  color: var(--text2);
}
.slot-chip:hover { border-color: var(--border2); }
.slot-chip.active { border-color: var(--red); background: rgba(232,17,45,0.1); color: white; }
.slot-chip.done { border-color: var(--green); background: rgba(0,200,150,0.08); }
.slot-chip.locked { opacity: 0.4; cursor: not-allowed; }
.slot-time { font-size: 13px; font-weight: 700; color: var(--text); display: block; }
.slot-label { font-size: 9px; margin-top: 2px; display: block; }
.slot-status { font-size: 15px; margin-top: 3px; display: block; }

/* ── Day row ── */
.day-scroll {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 2px 0 8px;
  scrollbar-width: none;
}
.day-scroll::-webkit-scrollbar { display: none; }
.day-chip {
  min-width: 58px;
  padding: 6px 10px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 11px;
  text-align: center;
  cursor: pointer;
  white-space: nowrap;
  color: var(--text2);
  transition: all 0.2s;
  flex-shrink: 0;
}
.day-chip.active { border-color: var(--red); color: white; background: rgba(232,17,45,0.12); font-weight: 600; }
.day-chip.complete { border-color: var(--green); color: var(--green); }

/* ── Phrase card (học) ── */
.phrase-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 10px;
  transition: all 0.3s;
  position: relative;
}
.phrase-card.known {
  background: var(--known);
  border-color: var(--known-border);
  opacity: 0.55;
}
.phrase-card.mastered {
  background: var(--done);
  border-color: var(--done-border);
  opacity: 0.45;
}
.phrase-card.known .card-body,
.phrase-card.mastered .card-body {
  display: none;
}
.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px 10px;
  cursor: pointer;
}
.card-num {
  width: 26px; height: 26px;
  background: rgba(232,17,45,0.2);
  border: 1px solid rgba(232,17,45,0.4);
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
  color: var(--red2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-ko { font-size: 20px; font-weight: 700; color: var(--gold); flex: 1; line-height: 1.2; }
.card-roman { font-size: 11px; color: var(--text2); font-style: italic; }
.card-status-badge {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 10px;
  font-weight: 600;
  flex-shrink: 0;
}
.badge-known { background: rgba(0,200,150,0.15); color: var(--green); border: 1px solid rgba(0,200,150,0.3); }
.badge-mastered { background: rgba(26,110,255,0.15); color: var(--blue2); border: 1px solid rgba(26,110,255,0.3); }
.badge-new { background: rgba(232,17,45,0.12); color: var(--red2); border: 1px solid rgba(232,17,45,0.25); }

.card-body { padding: 0 14px 14px; }
.vi-text { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 10px; }

/* Syllable */
.syllable-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.syllable-pill {
  display: inline-flex; flex-direction: column; align-items: center;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 5px 9px;
  font-size: 12px;
}
.syllable-pill .syl { font-size: 16px; font-weight: 700; color: var(--red2); }
.syllable-pill .syl-mean { font-size: 10px; color: var(--text2); margin-top: 2px; text-align: center; }

/* ── Word Breakdown (v4) ── */
.word-breakdown {
  margin-bottom: 12px;
}
.wbd-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.wbd-title::after { content:''; flex:1; height:1px; background:var(--border2); }
.wbd-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}
.word-chip {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  background: var(--bg3);
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  padding: 8px 10px 7px;
  cursor: pointer;
  transition: all 0.15s;
  min-width: 56px;
  position: relative;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.word-chip:active {
  transform: scale(0.94);
  border-color: var(--gold);
  background: rgba(255,215,0,0.08);
}
.word-chip.hanja-type {
  border-color: rgba(26,110,255,0.35);
  background: rgba(0,47,120,0.18);
}
.word-chip.pure-type {
  border-color: rgba(0,200,150,0.35);
  background: rgba(0,80,60,0.18);
}
.word-chip.grammar-type {
  border-color: rgba(255,124,46,0.35);
  background: rgba(100,40,0,0.18);
}
.word-chip.playing {
  border-color: var(--gold) !important;
  background: rgba(255,215,0,0.12) !important;
  box-shadow: 0 0 0 2px rgba(255,215,0,0.3);
}
.wc-korean {
  font-size: 17px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
}
.hanja-type .wc-korean { color: #7eb3ff; }
.pure-type .wc-korean { color: var(--green); }
.grammar-type .wc-korean { color: var(--orange); }
.wc-type-badge {
  font-size: 8px;
  padding: 1px 5px;
  border-radius: 4px;
  font-weight: 700;
  letter-spacing: 0.3px;
  margin-bottom: 4px;
}
.hanja-type .wc-type-badge { background: rgba(26,110,255,0.25); color: #7eb3ff; }
.pure-type .wc-type-badge { background: rgba(0,200,150,0.2); color: var(--green); }
.grammar-type .wc-type-badge { background: rgba(255,124,46,0.2); color: var(--orange); }
.wc-vi {
  font-size: 10px;
  color: var(--text2);
  text-align: center;
  line-height: 1.3;
  max-width: 80px;
}
.wc-hanja {
  font-size: 9px;
  color: var(--text3);
  margin-top: 3px;
  text-align: center;
}
.wc-sound-icon {
  position: absolute;
  top: 4px;
  right: 5px;
  font-size: 9px;
  opacity: 0.4;
}
.word-chip:active .wc-sound-icon { opacity: 1; }

/* Legend */
.wbd-legend {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 8px;
  padding: 6px 10px;
  background: var(--bg);
  border-radius: 6px;
  font-size: 10px;
  color: var(--text3);
}
.legend-dot {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 3px; vertical-align: middle;
}
.legend-hanja { background: #7eb3ff; }
.legend-pure { background: var(--green); }
.legend-grammar { background: var(--orange); }

/* Hanja box */
.hanja-box {
  background: rgba(0,71,171,0.12);
  border: 1px solid rgba(0,71,171,0.3);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 12px;
  color: #7eb3ff;
  margin-bottom: 10px;
  line-height: 1.5;
}
.hanja-label { font-size: 10px; color: var(--text3); font-weight: 700; margin-bottom: 3px; letter-spacing: 0.5px; }

/* Example box */
.example-box {
  background: var(--bg3);
  border-left: 3px solid var(--gold);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 8px 12px;
  margin-bottom: 10px;
  font-size: 13px;
}
.example-ko { color: var(--gold2); font-weight: 600; margin-bottom: 3px; }
.example-vi { color: var(--text2); font-size: 12px; }

/* Tip */
.tip-box {
  background: rgba(255,200,0,0.06);
  border: 1px solid rgba(255,200,0,0.18);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 12px;
  color: #ffd060;
  margin-bottom: 12px;
  line-height: 1.5;
}

/* Action buttons row */
.card-actions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-bottom: 6px;
}
.audio-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-bottom: 10px;
}
.btn {
  padding: 9px 6px;
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm);
  background: var(--bg3);
  color: var(--text);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  -webkit-appearance: none;
}
.btn:active { transform: scale(0.97); }
.btn-audio { border-color: rgba(232,17,45,0.3); color: var(--red2); background: rgba(232,17,45,0.06); }
.btn-audio:active { background: rgba(232,17,45,0.15); }
.btn-known { border-color: rgba(0,200,150,0.4); color: var(--green); background: rgba(0,200,150,0.06); }
.btn-known.active { background: rgba(0,200,150,0.18); border-color: var(--green); }
.btn-master { border-color: rgba(26,110,255,0.4); color: var(--blue2); background: rgba(26,110,255,0.06); }
.btn-master.active { background: rgba(26,110,255,0.18); border-color: var(--blue2); }
.btn-restore { border-color: rgba(255,124,46,0.4); color: var(--orange); background: rgba(255,124,46,0.06); font-size: 11px; }

/* Collapsed known/mastered card header */
.phrase-card.known .card-header,
.phrase-card.mastered .card-header {
  padding: 8px 14px;
}
.phrase-card.known .card-ko,
.phrase-card.mastered .card-ko { font-size: 15px; }

/* ── Session header ── */
.session-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.session-title { font-size: 16px; font-weight: 700; }
.session-stats { display: flex; gap: 8px; }
.stat-pill {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 600;
}
.stat-new { color: var(--red2); border-color: rgba(232,17,45,0.3); }
.stat-known { color: var(--green); border-color: rgba(0,200,150,0.3); }
.stat-done { color: var(--blue2); border-color: rgba(26,110,255,0.3); }

/* ── Locked / empty states ── */
.state-box {
  text-align: center;
  padding: 50px 24px;
}
.state-icon { font-size: 52px; margin-bottom: 14px; }
.state-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.state-desc { font-size: 13px; color: var(--text2); line-height: 1.7; }
.countdown-badge {
  display: inline-block;
  background: var(--card);
  border: 1px solid var(--border2);
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 15px;
  font-weight: 700;
  color: var(--gold);
  margin-top: 16px;
}

/* ── Filter bar ── */
.filter-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--border2);
  background: var(--card);
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 500;
}
.filter-btn.on { background: rgba(232,17,45,0.14); border-color: var(--red2); color: white; }
.filter-btn.on-green { background: rgba(0,200,150,0.12); border-color: var(--green); color: var(--green); }
.filter-btn.on-blue { background: rgba(26,110,255,0.12); border-color: var(--blue2); color: var(--blue2); }

/* ── Quiz ── */
.quiz-wrap { }
.quiz-stat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.q-stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px;
  text-align: center;
}
.q-stat-num { font-size: 22px; font-weight: 800; }
.q-stat-label { font-size: 10px; color: var(--text2); margin-top: 2px; }

.quiz-q-card {
  background: var(--card);
  border: 2px solid var(--border2);
  border-radius: var(--radius);
  padding: 24px 18px;
  text-align: center;
  margin-bottom: 14px;
  min-height: 160px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.quiz-prompt { font-size: 11px; color: var(--text3); margin-bottom: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
.quiz-ko { font-size: 34px; font-weight: 800; color: var(--gold); margin-bottom: 6px; line-height: 1.2; }
.quiz-roman { font-size: 14px; color: var(--text2); font-style: italic; }
.quiz-audio-icon { font-size: 52px; padding: 16px 0; }

.quiz-options { display: grid; gap: 8px; }
.quiz-opt {
  background: var(--card2);
  border: 2px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 13px 16px;
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  color: var(--text);
  transition: all 0.15s;
  -webkit-appearance: none;
}
.quiz-opt:active { transform: scale(0.99); }
.quiz-opt.correct { background: rgba(0,200,150,0.15); border-color: var(--green); color: var(--green); font-weight: 700; }
.quiz-opt.wrong { background: rgba(232,17,45,0.12); border-color: var(--red); color: #ff6680; }
.quiz-opt.reveal { background: rgba(0,200,150,0.08); border-color: rgba(0,200,150,0.4); color: var(--green); }

.quiz-next-btn {
  display: block;
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  background: linear-gradient(135deg, var(--red), #7a000e);
  border: none;
  border-radius: var(--radius-sm);
  color: white;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  border-radius: 12px;
}

/* ── Review (SRS) ── */
.review-card {
  background: var(--card);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 14px;
}
.flip-wrap { perspective: 1200px; margin: 0; }
.flip-inner {
  position: relative;
  min-height: 260px;
  transition: transform 0.55s;
  transform-style: preserve-3d;
  cursor: pointer;
}
.flip-inner.flipped { transform: rotateY(180deg); }
.flip-face {
  position: absolute;
  width: 100%;
  min-height: 260px;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
  text-align: center;
}
.flip-front { background: var(--card); }
.flip-back {
  background: var(--card2);
  transform: rotateY(180deg);
  justify-content: flex-start;
  padding-top: 20px;
}
.flip-ko { font-size: 36px; font-weight: 800; color: var(--gold); margin-bottom: 8px; }
.flip-roman { font-size: 15px; color: var(--text2); font-style: italic; margin-bottom: 16px; }
.flip-hint { font-size: 12px; color: var(--text3); }
.flip-vi { font-size: 20px; font-weight: 700; margin-bottom: 10px; text-align: center; width: 100%; }

.srs-buttons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.srs-btn { padding: 12px 6px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; color: white; transition: all 0.15s; }
.srs-btn:active { transform: scale(0.97); }
.srs-hard { background: #c0392b; }
.srs-mid { background: #e67e22; }
.srs-easy { background: #27ae60; }

/* ── Stats ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card-big {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}
.stat-big-num { font-size: 34px; font-weight: 800; color: var(--red2); }
.stat-big-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
.stat-big-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.progress-bar { background: var(--bg3); height: 6px; border-radius: 3px; overflow: hidden; margin: 8px 0; }
.progress-fill { background: linear-gradient(90deg, var(--red), var(--blue2)); height: 100%; transition: width 0.4s; border-radius: 3px; }

/* ── Settings ── */
.settings-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
.settings-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }

// Bản đồ nhận diện loại từ từ trường 'm' trong syllables
function detectWordType(mean) {
  const m = mean || '';
  // Ngữ pháp (đuôi, kết nối, trợ từ)
  const grammarPatterns = [
    'đuôi', 'kính', 'kết nối', 'trợ từ', 'ngữ pháp', 'nếu', 'vì',
    'hướng về', 'khiêm', 'mời', 'mong', 'cầu chúc', 'ý chí',
    'số nhiều', 'nhấn mạnh', 'phủ định', 'bị động', 'chủ đề',
    'tương lai', 'quá khứ', 'phỏng đoán', 'danh từ hóa',
    'bình thường', 'lại', 'ngay khi', 'chỉ một chút',
    'và', 'nhưng', 'mà', 'làm', 'trở thành',
    '-', '~'
  ];
  if (grammarPatterns.some(g => m.toLowerCase().includes(g))) return 'grammar';

  // Thuần Hàn
  const purePatterns = [
    'thuần hàn', 'thuần', 'pure', 'tượng thanh', 'bụng', 'mặt',
    'chân', 'tay', 'mắt', 'miệng', 'tai', 'lời', 'lòng',
    'theo', 'đến', 'vui', 'buồn', 'lo', 'ngạc nhiên', 'yêu',
    'gió', 'nước', 'biển', 'đường', 'rộng', 'lớn', 'nhiều',
    'bây giờ', 'lại', 'cùng', 'thật'
  ];
  if (purePatterns.some(g => m.toLowerCase().includes(g))) return 'pure';

  // Hán-Hàn (có chữ Hán hoặc âm Hán Việt)
  // Nhận biết qua: có ký tự Hán (漢字) hoặc âm Hán Việt trong ngoặc
  if (/[一-鿿]/u.test(m)) return 'hanja';
  const hanjaViPatterns = [
    ' = "', 'hán', 'hán việt', 'hán-việt', '(hv)', 'hữu', 'tình',
    'an', 'ninh', 'thực', 'sự', 'di động', 'di chuyển', 'lịch trình',
    'thời gian', 'nhật', 'trình', 'xuất', 'phát', 'quan', 'quang',
    'tham quan', 'an toàn', 'nguy hiểm', 'chiến tranh', 'lịch sử',
    'văn hóa', 'hạnh phúc', 'sức khỏe', 'thành công', 'cảm ơn',
    'kính', 'khiêm nhường', 'trang trọng', 'cảm tạ', 'thụ khổ',
    'đại lý', 'đáo trước', 'tự viện', 'phong cảnh', 'kỷ niệm',
    'bảo tồn', 'thuyết minh', 'lý giải', 'chân tâm', 'các biệt',
    'giải quyết', 'phát sinh', 'không thể kháng', 'ưu tiên',
    'phó thác', 'lượng giải', 'bất tiện', 'xin lỗi', 'nhân duyên',
    'bí mật', 'anh hùng', 'độc lập', 'hòa bình', 'di sản',
    'thực dân', 'hy sinh', 'thế đại', 'truyền thuyết', 'thiên quốc',
    'địa ngục', 'tái hiện', 'đặc sản', 'tỷ giá', 'thanh toán',
    'giảm giá', 'giá cả', 'mậu dịch', 'dự định', 'dự kiến'
  ];
  if (hanjaViPatterns.some(g => m.toLowerCase().includes(g))) return 'hanja';

  // Mặc định: xem có vẻ là Hán không
  if (m.length > 3 && !m.includes('thuần') && !m.includes('pure')) return 'hanja';
  return 'pure';
}

function extractHanjaChar(mean) {
  // Trích xuất chữ Hán nếu có trong chuỗi mean
  // VD: "安 an" → "安" | "先生nim" → "" | "感謝" → "感謝"
  const hanMatch = mean.match(/[一-鿿々〇〻]{1,4}/u);
  if (hanMatch) return hanMatch[0];

  // Trích xuất dạng "= "XYZ"" hoặc "(XY)"
  const quoteMatch = mean.match(/= [""]([^"""]+)["""]/);
  if (quoteMatch) return quoteMatch[1];

  return '';
}

function renderWordBreakdown(syllables, cardId) {
  if (!syllables || !syllables.length) return '';

  let html = `<div class="word-breakdown">
    <div class="wbd-title">🔍 PHÂN TÍCH TỪNG THÀNH PHẦN</div>
    <div class="wbd-grid">`;

  syllables.forEach((s, i) => {
    const type = detectWordType(s.m);
    const hanjaChar = extractHanjaChar(s.m);
    const typeLabel = type === 'hanja' ? '漢 Hán-Hàn' : type === 'pure' ? '純 Thuần Hàn' : '文 Ngữ pháp';
    const safeText = s.t.replace(/'/g, "\\'").replace(/~/g, '');
    const chipId = `chip-${cardId}-${i}`;

    html += `<div class="word-chip ${type}-type" id="${chipId}"
      onclick="speakWordChip('${safeText}', '${chipId}')"
      role="button" aria-label="Nghe phát âm: ${s.t}">
      <span class="wc-sound-icon">🔊</span>
      <span class="wc-korean">${s.t}</span>
      <span class="wc-type-badge">${typeLabel}</span>
      <span class="wc-vi">${s.m}</span>`;

    if (hanjaChar) {
      html += `<span class="wc-hanja">${hanjaChar}</span>`;
    }

    html += `</div>`;
  });

  html += `</div>
    <div class="wbd-legend">
      <span><span class="legend-dot legend-hanja"></span>Hán-Hàn (gốc chữ Hán)</span>
      <span><span class="legend-dot legend-pure"></span>Thuần Hàn (gốc bản địa)</span>
      <span><span class="legend-dot legend-grammar"></span>Ngữ pháp / Đuôi câu</span>
    </div>
  </div>`;

  return html;
}

// Phát âm từng word chip — có hiệu ứng highlight
function speakWordChip(text, chipId) {
  if (!text || !text.trim()) return;
  speechSynthesis.cancel();

  // Bỏ highlight chip cũ
  document.querySelectorAll('.word-chip.playing').forEach(el => el.classList.remove('playing'));

  // Highlight chip đang phát
  const chip = document.getElementById(chipId);
  if (chip) chip.classList.add('playing');

  const u = new SpeechSynthesisUtterance(text.replace(/~/g, ''));
  u.lang = 'ko-KR';
  u.rate = 0.75; // Chậm hơn khi đọc từng từ để nghe rõ
  u.pitch = 1;
  if (KVoice) u.voice = KVoice;

  u.onend = () => {
    if (chip) chip.classList.remove('playing');
  };
  u.onerror = () => {
    if (chip) chip.classList.remove('playing');
  };

  speechSynthesis.speak(u);
}

/* ================================================================
   STATE MANAGEMENT
   ================================================================ */
let S = JSON.parse(localStorage.getItem('hdv3') || '{}');
// known: Set của các phraseId đã biết rồi (ẩn khỏi danh sách học)
// mastered: Set của các phraseId đã học xong (ẩn, chỉ hiện khi yêu cầu)
// scores: object phraseId -> số điểm SRS
// quizStats: thống kê quiz
// progress: slot progress
S.known = new Set(S.knownArr || []);
S.mastered = new Set(S.masteredArr || []);
S.scores = S.scores || {};
S.quizStats = S.quizStats || { total: 0, correct: 0, streak: 0, best: 0 };
S.progress = S.progress || {};
S.day = S.day || 1;
S.slot = S.slot || 0;
S.mode = S.mode || 'strict';
S.tab = S.tab || 'learn';
S.filter = S.filter || 'new';  // 'new' | 'known' | 'mastered' | 'all'
S.notif = S.notif || false;

function saveS() {
  S.knownArr = [...S.known];
  S.masteredArr = [...S.mastered];
  localStorage.setItem('hdv3', JSON.stringify(S));
}

function pid(day, slot, idx) { return `d${day}s${slot}p${idx}`; }

function getPhrase(day, slot, idx) {
  const d = DB[(day-1) % DB.length];
  if (!d) return null;
  const sl = d[slot % d.length];
  if (!sl) return null;
  return sl[idx] || null;
}

function getAllPhrases() {
  const all = [];
  DB.forEach((day, di) => {
    day.forEach((slot, si) => {
      slot.forEach((p, pi) => {
        all.push({ ...p, id: `d${di+1}s${si}p${pi}`, day: di+1, slot: si, idx: pi });
      });
    });
  });
  return all;
}

/* ================================================================
   VOICE
   ================================================================ */
let KVoice = null;
function loadVoice() {
  const vv = speechSynthesis.getVoices();
  const pref = ['Yuna', 'Google 한국의', 'Microsoft Heami', 'Microsoft SunHi'];
  for (const n of pref) { KVoice = vv.find(v => v.name.includes(n)); if (KVoice) break; }
  if (!KVoice) KVoice = vv.find(v => v.lang.startsWith('ko')) || null;
}
speechSynthesis.onvoiceschanged = loadVoice;
loadVoice(); setTimeout(loadVoice, 500);

function speak(text, rate) {
  if (!text) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.replace(/~/g, ''));
  u.lang = 'ko-KR'; u.rate = rate || 0.85;
  if (KVoice) u.voice = KVoice;
  speechSynthesis.speak(u);
}

/* ================================================================
   CLOCK & NOTIFY
   ================================================================ */
function tick() {
  const n = new Date();
  const el = document.getElementById('clock');
  if (el) el.textContent = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
setInterval(tick, 10000); tick();

function isUnlocked(slotIdx) {
  if (S.mode === 'free') return true;
  return new Date().getHours() >= SLOTS_CFG[slotIdx].hour;
}

function formatCountdown(h) {
  const now = new Date(), t = new Date();
  t.setHours(h, 0, 0, 0);
  if (t < now) t.setDate(t.getDate() + 1);
  const d = t - now;
  return `${Math.floor(d/3600000)}h ${Math.floor((d%3600000)/60000)}m`;
}

/* ================================================================
   TABS
   ================================================================ */
function switchTab(tab) {
  S.tab = tab; saveS();
  ['learn','quiz','review','stats'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t !== tab);
    document.querySelector(`.tab-item[data-tab="${t}"]`).classList.toggle('active', t === tab);
  });
  if (tab === 'quiz') renderQuiz();
  else if (tab === 'review') renderReview();
  else if (tab === 'stats') renderStats();
  else renderLearn();
}

/* ================================================================
   LEARN TAB
   ================================================================ */
function renderLearn() {
  const el = document.getElementById('tab-learn');
  const dayData = DB[(S.day-1) % DB.length];
  const slotData = dayData[S.slot % dayData.length];

  // Thống kê slot hiện tại
  let cntNew=0, cntKnown=0, cntMastered=0;
  slotData.forEach((p,i) => {
    const id = pid(S.day, S.slot, i);
    if (S.mastered.has(id)) cntMastered++;
    else if (S.known.has(id)) cntKnown++;
    else cntNew++;
  });

  let html = '';

  // Day selector
  html += `<div class="day-scroll" id="day-scroll">`;
  for (let d = 1; d <= DB.length; d++) {
    const done = SLOTS_CFG.every((_,si) => (S.progress[`d${d}s${si}`]||0) >= 3);
    html += `<div class="day-chip ${S.day===d?'active':''} ${done?'complete':''}" onclick="changeDay(${d})">${d===S.day?'📅 ':''}Ngày ${d}</div>`;
  }
  html += `</div>`;

  // Slot bar
  html += `<div class="slot-bar">`;
  SLOTS_CFG.forEach((s,i) => {
    const unlocked = isUnlocked(i);
    const done = (S.progress[`d${S.day}s${i}`]||0) >= 3;
    html += `<div class="slot-chip ${S.slot===i?'active':''} ${!unlocked?'locked':''} ${done?'done':''}" onclick="changeSlot(${i})">
      <span class="slot-time">${s.hour}h</span>
      <span class="slot-label">${s.label}</span>
      <span class="slot-status">${done?'✅':unlocked?'📖':'🔒'}</span>
    </div>`;
  });
  html += `</div>`;

  // Nếu slot bị khóa
  if (!isUnlocked(S.slot)) {
    html += `<div class="main-card"><div class="state-box">
      <div class="state-icon">🔒</div>
      <div class="state-title">Khung ${SLOTS_CFG[S.slot].hour}h chưa mở</div>
      <div class="state-desc">Quay lại lúc <b>${SLOTS_CFG[S.slot].hour}:00</b><br>hoặc bật "Mở hết" để luyện tự do</div>
      <div class="countdown-badge">⏱️ Còn ${formatCountdown(SLOTS_CFG[S.slot].hour)}</div>
    </div></div>`;
    el.innerHTML = html;
    renderSettings(el);
    return;
  }

  // Session header
  html += `<div class="main-card">
    <div class="session-header">
      <div class="session-title">${SLOTS_CFG[S.slot].hour}h · ${SLOTS_CFG[S.slot].label}</div>
      <div class="session-stats">
        <span class="stat-pill stat-new">🔴 ${cntNew} mới</span>
        <span class="stat-pill stat-known">🟢 ${cntKnown} biết</span>
        <span class="stat-pill stat-done">🔵 ${cntMastered} xong</span>
      </div>
    </div>`;

  // Filter bar
  html += `<div class="filter-bar">
    <div class="filter-btn ${S.filter==='new'?'on':''}" onclick="setFilter('new')">📖 Cần học (${cntNew})</div>
    <div class="filter-btn ${S.filter==='known'?'on-green':''}" onclick="setFilter('known')">✓ Đã biết (${cntKnown})</div>
    <div class="filter-btn ${S.filter==='mastered'?'on-blue':''}" onclick="setFilter('mastered')">★ Đã xong (${cntMastered})</div>
    <div class="filter-btn ${S.filter==='all'?'on':''}" onclick="setFilter('all')">Tất cả</div>
  </div>`;

  // Nếu filter=known hoặc mastered mà ko có gì
  const filteredPhrases = slotData.map((p,i) => ({...p, _i:i, _id:pid(S.day,S.slot,i)})).filter(p => {
    const known = S.known.has(p._id), mastered = S.mastered.has(p._id);
    if (S.filter === 'new') return !known && !mastered;
    if (S.filter === 'known') return known && !mastered;
    if (S.filter === 'mastered') return mastered;
    return true;
  });

  if (filteredPhrases.length === 0) {
    if (S.filter === 'new') {
      html += `<div class="state-box">
        <div class="state-icon">🎉</div>
        <div class="state-title">Tất cả đã học xong!</div>
        <div class="state-desc">Khung này quý khách đã biết hoặc học xong hết rồi.<br>Xem tab Ôn tập hoặc thử Quiz nhé.</div>
      </div>`;
    } else {
      html += `<div class="state-box">
        <div class="state-icon">📭</div>
        <div class="state-title">Không có cụm nào ở mục này</div>
        <div class="state-desc">Chưa có cụm nào ở bộ lọc này trong khung giờ này.</div>
      </div>`;
    }
    html += `</div>`;
    el.innerHTML = html;
    renderSettings(el);
    return;
  }

  // Render từng phrase card
  filteredPhrases.forEach(p => {
    const known = S.known.has(p._id);
    const mastered = S.mastered.has(p._id);
    const badgeHtml = mastered
      ? `<span class="card-status-badge badge-mastered">★ Đã xong</span>`
      : known
      ? `<span class="card-status-badge badge-known">✓ Đã biết</span>`
      : `<span class="card-status-badge badge-new">● Cần học</span>`;

    html += `<div class="phrase-card ${mastered?'mastered':known?'known':''}" id="card-${p._id}">
      <div class="card-header" onclick="toggleCard('${p._id}')">
        <div class="card-num">${p._i+1}</div>
        <div style="flex:1">
          <div class="card-ko">${p.ko}</div>
          <div class="card-roman">${p.roman}</div>
        </div>
        ${badgeHtml}
      </div>
      <div class="card-body" id="body-${p._id}">
        <div class="vi-text">${p.vi}</div>`;

    // Word Breakdown (v4 - phân tích từng từ, nhấn để nghe)
    if (p.syllables && p.syllables.length) {
      html += renderWordBreakdown(p.syllables, p._id);
    }

    // Hanja
    html += `<div class="hanja-box"><div class="hanja-label">🈶 GỐC HÁN-HÀN</div>${p.hanja}</div>`;

    // Example
    html += `<div class="example-box"><div class="example-ko">${p.ex.ko}</div><div class="example-vi">→ ${p.ex.vi}</div></div>`;

    // Tip
    html += `<div class="tip-box">💡 ${p.tip}</div>`;

    // Audio buttons
    html += `<div class="audio-row">
      <button class="btn btn-audio" onclick="speak('${p.ko.replace(/'/g,"\\'")}', 0.55)">🔊 Chậm</button>
      <button class="btn btn-audio" onclick="speak('${p.ko.replace(/'/g,"\\'")}', 0.9)">🔊 Thường</button>
      <button class="btn btn-audio" onclick="speak('${p.ex.ko.replace(/'/g,"\\'")}', 0.85)">🎧 Cả câu</button>
    </div>`;

    // Action buttons
    if (mastered) {
      html += `<div class="card-actions">
        <button class="btn btn-restore" onclick="restorePhrase('${p._id}')" style="grid-column:1/-1">↩ Học lại từ đầu</button>
      </div>`;
    } else if (known) {
      html += `<div class="card-actions">
        <button class="btn btn-master" onclick="markMastered('${p._id}')">★ Đã học xong</button>
        <button class="btn btn-restore" onclick="restorePhrase('${p._id}')">↩ Học lại</button>
      </div>`;
    } else {
      html += `<div class="card-actions">
        <button class="btn btn-known" onclick="markKnown('${p._id}')">✓ Đã biết rồi</button>
        <button class="btn btn-master" onclick="markMastered('${p._id}')">★ Học xong rồi</button>
      </div>`;
    }

    html += `</div></div>`;  // end card-body, phrase-card
  });

  // Phần hiển thị các từ đã ẩn (known + mastered)
  const hiddenCount = slotData.filter((_,i) => {
    const id = pid(S.day, S.slot, i);
    return S.known.has(id) || S.mastered.has(id);
  }).length;

  if (hiddenCount > 0 && S.filter === 'new') {
    html += `<div class="restore-section">
      <div class="restore-header" onclick="toggleRestoreSection()">
        <span class="restore-title">🔽 Các cụm đã ẩn</span>
        <span class="restore-count">${hiddenCount} cụm</span>
      </div>
      <div class="restore-body" id="restore-body">`;
    slotData.forEach((p,i) => {
      const id = pid(S.day, S.slot, i);
      if (S.known.has(id) || S.mastered.has(id)) {
        const type = S.mastered.has(id) ? '★ Đã xong' : '✓ Đã biết';
        html += `<div class="restore-item">
          <div><span class="restore-ko">${p.ko}</span> <span style="font-size:11px;color:var(--text3)">· ${p.vi.substring(0,25)}...</span></div>
          <div style="display:flex;gap:6px;align-items:center">
            <span class="restore-type">${type}</span>
            <button class="btn btn-restore" style="padding:4px 8px;font-size:10px" onclick="restorePhrase('${id}')">↩</button>
          </div>
        </div>`;
      }
    });
    html += `</div></div>`;
  }

  html += `</div>`;  // end main-card
  el.innerHTML = html;
  renderSettings(el);
}

function renderSettings(el) {
  let html = `<div class="settings-section">
    <div class="settings-title">⚙️ Cài đặt</div>
    <div class="setting-row">
      <span class="setting-label">Thông báo desktop</span>
      <button class="tog-btn ${S.notif?'on-green':''}" onclick="toggleNotif()">${S.notif?'✓ Đã bật':'Bật'}</button>
    </div>
    <div class="setting-row">
      <span class="setting-label">Chế độ mở khóa</span>
      <div class="tog-row">
        <button class="tog-btn ${S.mode==='strict'?'on':''}" onclick="setMode('strict')">Theo giờ</button>
        <button class="tog-btn ${S.mode==='free'?'on':''}" onclick="setMode('free')">Mở hết</button>
      </div>
    </div>
  </div>`;
  el.innerHTML += html;
}

function toggleCard(id) {
  // Click header mở/đóng body nếu chưa known/mastered
  const card = document.getElementById('card-' + id);
  if (!card) return;
  if (card.classList.contains('known') || card.classList.contains('mastered')) {
    // Toggle expand
    card.classList.toggle('known-expand');
    const body = document.getElementById('body-' + id);
    if (body) body.style.display = body.style.display === 'block' ? 'none' : 'block';
  }
}

function toggleRestoreSection() {
  const el = document.getElementById('restore-body');
  if (el) el.classList.toggle('open');
}

function markKnown(id) {
  S.known.add(id);
  S.mastered.delete(id);
  saveS();
  renderLearn();
}

function markMastered(id) {
  S.mastered.add(id);
  S.known.delete(id);
  saveS();
  checkSlotDone();
  renderLearn();
}

function restorePhrase(id) {
  S.known.delete(id);
  S.mastered.delete(id);
  saveS();
  renderLearn();
}

function checkSlotDone() {
  const dayData = DB[(S.day-1) % DB.length];
  const slotData = dayData[S.slot % dayData.length];
  const allDone = slotData.every((_,i) => {
    const id = pid(S.day, S.slot, i);
    return S.known.has(id) || S.mastered.has(id);
  });
  if (allDone) {
    S.progress[`d${S.day}s${S.slot}`] = 3;
    saveS();
  }
}

function setFilter(f) {
  S.filter = f; saveS(); renderLearn();
}

function changeDay(d) {
  S.day = d; S.filter = 'new'; saveS(); renderLearn();
}

function changeSlot(i) {
  if (!isUnlocked(i) && S.mode === 'strict') return;
  S.slot = i; S.filter = 'new'; saveS(); renderLearn();
}

function setMode(m) {
  S.mode = m; saveS(); renderLearn();
}

function toggleNotif() {
  if (!('Notification' in window)) { alert('Trình duyệt không hỗ trợ.'); return; }
  Notification.requestPermission().then(p => {
    if (p === 'granted') {
      S.notif = true; saveS();
      new Notification('🇰🇷 Đã bật!', { body: 'Sẽ nhắc lúc 7h, 10h, 15h, 17h, 21h' });
      renderLearn();
    }
  });
}

/* ================================================================
   QUIZ TAB
   ================================================================ */
let CQ = null;

function renderQuiz() {
  const el = document.getElementById('tab-quiz');
  const all = getAllPhrases();
  // Chỉ quiz với từ chưa mastered và ở ngày <= hiện tại
  const pool = all.filter(p => p.day <= S.day && !S.mastered.has(p.id));

  if (pool.length < 4) {
    el.innerHTML = `<div class="main-card"><div class="state-box">
      <div class="state-icon">🎯</div>
      <div class="state-title">Cần học thêm trước</div>
      <div class="state-desc">Cần ít nhất 4 cụm chưa xong để quiz.<br>Hãy học ở tab Học trước nhé!</div>
    </div></div>`; return;
  }

  const qs = S.quizStats;
  const acc = qs.total > 0 ? Math.round(qs.correct/qs.total*100) : 0;

  // Chọn cụm ưu tiên score thấp
  const weighted = pool.map(p => ({...p, w: 10-(S.scores[p.id]||0)})).sort((a,b) => b.w - a.w);
  const top = weighted.slice(0, Math.min(30, weighted.length));
  const correct = top[Math.floor(Math.random()*top.length)];
  const wrongs = pool.filter(p => p.id !== correct.id).sort(()=>Math.random()-0.5).slice(0,3);
  const opts = [correct, ...wrongs].sort(()=>Math.random()-0.5);
  const audioOnly = Math.random() < 0.45;
  CQ = { correct, opts, audioOnly, answered: false };

  let html = `<div class="quiz-wrap">
    <div class="quiz-stat-row">
      <div class="q-stat"><div class="q-stat-num" style="color:var(--gold)">${qs.total}</div><div class="q-stat-label">Tổng câu</div></div>
      <div class="q-stat"><div class="q-stat-num" style="color:var(--green)">${acc}%</div><div class="q-stat-label">Chính xác</div></div>
      <div class="q-stat"><div class="q-stat-num" style="color:var(--orange)">🔥${qs.streak}</div><div class="q-stat-label">Streak</div></div>
    </div>
    <div class="main-card">`;

  if (audioOnly) {
    html += `<div class="quiz-q-card"><div class="quiz-prompt">🎧 NGHE VÀ CHỌN NGHĨA ĐÚNG</div><div class="quiz-audio-icon">🔊</div><button class="btn btn-audio" onclick="speak('${correct.ko.replace(/'/g,"\\'")}', 0.8)">▶ Phát lại</button></div>`;
    setTimeout(() => speak(correct.ko, 0.8), 300);
  } else {
    html += `<div class="quiz-q-card"><div class="quiz-prompt">CỤM TỪ NÀY NGHĨA LÀ GÌ?</div><div class="quiz-ko">${correct.ko}</div><div class="quiz-roman">${correct.roman}</div><button class="btn btn-audio" style="margin-top:10px" onclick="speak('${correct.ko.replace(/'/g,"\\'")}', 0.85)">🔊 Nghe</button></div>`;
  }

  html += `<div class="quiz-options">`;
  opts.forEach((o,i) => {
    html += `<button class="quiz-opt" id="qopt-${i}" onclick="answerQ(${i},'${o.id}')">${o.vi}</button>`;
  });
  html += `</div></div></div>`;
  el.innerHTML = html;
}

function answerQ(idx, id) {
  if (!CQ || CQ.answered) return;
  CQ.answered = true;
  const isOk = id === CQ.correct.id;
  S.quizStats.total++;
  if (isOk) {
    S.quizStats.correct++;
    S.quizStats.streak++;
    if (S.quizStats.streak > S.quizStats.best) S.quizStats.best = S.quizStats.streak;
    S.scores[CQ.correct.id] = Math.min(10, (S.scores[CQ.correct.id]||0)+1);
    document.getElementById('qopt-'+idx).classList.add('correct');
  } else {
    S.quizStats.streak = 0;
    S.scores[CQ.correct.id] = Math.max(0, (S.scores[CQ.correct.id]||0)-2);
    document.getElementById('qopt-'+idx).classList.add('wrong');
    CQ.opts.forEach((_,i) => {
      if (CQ.opts[i].id === CQ.correct.id) document.getElementById('qopt-'+i).classList.add('reveal');
    });
  }
  saveS();
  setTimeout(() => {
    const btn = document.createElement('button');
    btn.className = 'quiz-next-btn';
    btn.textContent = isOk ? '✓ Đúng! Câu tiếp →' : '✗ Sai. Câu tiếp →';
    btn.onclick = renderQuiz;
    document.querySelector('.quiz-options').after(btn);
  }, 700);
}

/* ================================================================
   REVIEW TAB (SRS)
   ================================================================ */
let RI = 0; let RFlipped = false;

function getReviewQueue() {
  return getAllPhrases()
    .filter(p => p.day <= S.day && !S.mastered.has(p.id))
    .sort((a,b) => (S.scores[a.id]||0)-(S.scores[b.id]||0));
}

function renderReview() {
  const el = document.getElementById('tab-review');
  const q = getReviewQueue();
  if (q.length === 0) {
    el.innerHTML = `<div class="main-card"><div class="state-box">
      <div class="state-icon">🎉</div><div class="state-title">Không có gì cần ôn</div>
      <div class="state-desc">Tất cả đã thạo hoặc chưa học tới.<br>Học thêm ngày mới hoặc dùng Quiz!</div>
    </div></div>`; return;
  }
  if (RI >= q.length) RI = 0;
  const p = q[RI];
  const score = S.scores[p.id]||0;
  const [diffLabel, diffColor] = score<=3 ? ['Khó','#e8112d'] : score<=6 ? ['Vừa','#ff7c2e'] : ['Dễ','#00c896'];

  const koSafe = p.ko.replace(/'/g,"\\'");
  const exSafe = p.ex.ko.replace(/'/g,"\\'");

  let html = `<div class="main-card">
    <div class="session-header">
      <div class="session-title">🔁 Ôn ${RI+1}/${q.length}</div>
      <span class="stat-pill" style="color:${diffColor};border-color:${diffColor}">${diffLabel}</span>
    </div>
    <div class="flip-wrap"><div class="flip-inner ${RFlipped?'flipped':''}" id="flipper" onclick="flipReview()">
      <div class="flip-face flip-front">
        <div class="flip-ko">${p.ko}</div>
        <div class="flip-roman">${p.roman}</div>
        <div class="flip-hint">Nhấn để xem nghĩa</div>
      </div>
      <div class="flip-face flip-back">
        <div class="flip-vi">${p.vi}</div>
        <div class="tip-box" style="font-size:12px;text-align:left">💡 ${p.tip}</div>
        <div class="example-box"><div class="example-ko">${p.ex.ko}</div><div class="example-vi">→ ${p.ex.vi}</div></div>
        ${p.syllables ? renderWordBreakdown(p.syllables, 'rev-'+RI) : ''}
      </div>
    </div></div>
    <div class="audio-row" style="margin-top:10px">
      <button class="btn btn-audio" onclick="speak('${koSafe}',0.55)">🔊 Chậm</button>
      <button class="btn btn-audio" onclick="speak('${koSafe}',0.9)">🔊 Thường</button>
      <button class="btn btn-audio" onclick="speak('${exSafe}',0.85)">🎧 Câu ví dụ</button>
    </div>
    <div class="srs-buttons">
      <button class="srs-btn srs-hard" onclick="rateR(-2)">😵 Quên</button>
      <button class="srs-btn srs-mid" onclick="rateR(0)">🤔 Phân vân</button>
      <button class="srs-btn srs-easy" onclick="rateR(2)">😎 Nhớ rõ</button>
    </div>
    <div class="section-label">Đánh dấu cụm này</div>
    <div class="card-actions">
      <button class="btn btn-known" onclick="markKnownReview('${p.id}')">✓ Đã biết rồi</button>
      <button class="btn btn-master" onclick="markMasteredReview('${p.id}')">★ Học xong, ẩn đi</button>
    </div>
  </div>`;
  el.innerHTML = html;
}

function flipReview() {
  RFlipped = !RFlipped;
  const f = document.getElementById('flipper');
  if (f) f.classList.toggle('flipped', RFlipped);
}

function rateR(delta) {
  const q = getReviewQueue();
  if (q[RI]) {
    S.scores[q[RI].id] = Math.max(0, Math.min(10, (S.scores[q[RI].id]||0)+delta));
    saveS();
  }
  RI++; RFlipped = false;
  if (RI >= q.length) {
    RI = 0;
    document.getElementById('tab-review').innerHTML = `<div class="main-card"><div class="state-box">
      <div class="state-icon">🎉</div><div class="state-title">Xong 1 vòng ôn tập!</div>
      <div class="state-desc">Làm tiếp để củng cố.</div>
      <button class="btn" style="margin-top:16px;width:100%" onclick="RI=0;renderReview()">🔁 Ôn lại</button>
    </div></div>`;
  } else renderReview();
}

function markKnownReview(id) { S.known.add(id); S.mastered.delete(id); saveS(); rateR(0); }
function markMasteredReview(id) { S.mastered.add(id); S.known.delete(id); saveS(); rateR(1); }

/* ================================================================
   STATS TAB
   ================================================================ */
function renderStats() {
  const el = document.getElementById('tab-stats');
  const all = getAllPhrases();
  const total = all.length;
  const mastered = all.filter(p => S.mastered.has(p.id)).length;
  const known = all.filter(p => S.known.has(p.id)).length;
  const learned = all.filter(p => p.day <= S.day).length;
  const qs = S.quizStats;
  const acc = qs.total>0 ? Math.round(qs.correct/qs.total*100) : 0;

  const hardList = all.filter(p => (S.scores[p.id]||0) <= 2 && S.scores[p.id]!==undefined && !S.mastered.has(p.id)).slice(0,5);

  let html = `<div class="main-card">
    <div class="session-header"><div class="session-title">📊 Thống kê</div></div>
    <div class="stats-grid">
      <div class="stat-card-big"><div class="stat-big-num">${learned}</div><div class="stat-big-label">Đã tiếp xúc</div><div class="stat-big-sub">/ ${total} cụm tổng</div></div>
      <div class="stat-card-big"><div class="stat-big-num" style="color:var(--green)">${mastered}</div><div class="stat-big-label">★ Đã thạo</div><div class="stat-big-sub">(ẩn khỏi học)</div></div>
      <div class="stat-card-big"><div class="stat-big-num" style="color:var(--blue2)">${known}</div><div class="stat-big-label">✓ Đã biết</div><div class="stat-big-sub">(đang luyện thêm)</div></div>
      <div class="stat-card-big"><div class="stat-big-num" style="color:var(--gold)">${acc}%</div><div class="stat-big-label">Quiz chính xác</div><div class="stat-big-sub">${qs.correct}/${qs.total} câu</div></div>
    </div>
    <div style="padding:12px 0">
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px">Tiến trình hoàn thành</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(mastered/total*100)}%"></div></div>
      <div style="font-size:11px;color:var(--text3);text-align:center;margin-top:4px">${Math.round(mastered/total*100)}% đã thạo</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0">
      <div class="stat-card-big" style="padding:12px"><div class="stat-big-num" style="font-size:24px">🔥 ${qs.streak}</div><div class="stat-big-label">Streak hiện tại</div></div>
      <div class="stat-card-big" style="padding:12px"><div class="stat-big-num" style="font-size:24px">🏆 ${qs.best}</div><div class="stat-big-label">Streak tốt nhất</div></div>
    </div>`;

  if (hardList.length > 0) {
    html += `<div class="section-label">⚠ CỤM KHÓ NHẤT - CẦN ÔN</div>`;
    hardList.forEach(p => {
      html += `<div style="background:rgba(232,17,45,0.07);border:1px solid rgba(232,17,45,0.2);border-radius:8px;padding:8px 12px;margin:5px 0;font-size:12px">
        <span style="color:var(--gold);font-weight:700">${p.ko}</span> · <span style="color:var(--text2)">${p.vi.substring(0,30)}...</span>
      </div>`;
    });
  }

  html += `<div class="section-label">🔧 QUẢN LÝ</div>
    <div style="display:grid;gap:8px">
      <button class="btn btn-known" onclick="restoreAll('known')">↩ Khôi phục tất cả "Đã biết" (${known} cụm)</button>
      <button class="btn btn-master" onclick="restoreAll('mastered')">↩ Khôi phục tất cả "Đã xong" (${mastered} cụm)</button>
      <button class="btn" style="background:#333;color:#ff6680;border-color:#ff4060" onclick="if(confirm('Reset tất cả tiến độ?')){localStorage.removeItem('hdv3');location.reload()}">🗑 Reset toàn bộ tiến độ</button>
    </div>
  </div>`;

  el.innerHTML = html;
}

function restoreAll(type) {
  if (type === 'known') S.known = new Set();
  else S.mastered = new Set();
  saveS();
  renderStats();
}

/* ================================================================
   NOTIFY CHECK
   ================================================================ */
setInterval(() => {
  if (!S.notif) return;
  const now = new Date(), h = now.getHours(), m = now.getMinutes();
  const slot = SLOTS_CFG.find(s => s.hour === h && m === 0);
  if (slot) {
    const key = now.toDateString()+'-'+h;
    if (localStorage.getItem('lastN') !== key) {
      new Notification('🇰🇷 Đến giờ học!', { body: `Khung ${h}h (${slot.label}) đã mở. 3 cụm thực chiến đang chờ.`, icon:'./icon-192.png' });
      localStorage.setItem('lastN', key);
    }
  }
}, 30000);

/* ================================================================
   PWA
   ================================================================ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js'));
}
let dP = null;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); dP = e; showBanner(); });
function showBanner() {
  if (localStorage.getItem('ibD') === '1') return;
  if (window.matchMedia('(display-mode: standalone)').matches) return;
  const b = document.createElement('div');
  b.id = 'install-banner';
  b.innerHTML = `<div style="font-size:28px">📲</div><div class="install-text"><div class="install-title">Cài vào màn hình chính</div><div class="install-sub">Dùng như app thật · Offline · Nhắc giờ học</div></div><button class="btn-install" onclick="doInstall()">Cài ngay</button><button class="btn-dismiss" onclick="document.getElementById('install-banner').remove();localStorage.setItem('ibD','1')">×</button>`;
  document.body.appendChild(b);
}
async function doInstall() {
  if (!dP) return;
  dP.prompt();
  const {outcome} = await dP.userChoice;
  dP = null;
  document.getElementById('install-banner')?.remove();
}

/* ================================================================
   BOOT
   ================================================================ */
switchTab(S.tab);
</script>
