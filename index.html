      ko: '안녕하세요, 여러분. 저는 (이름) 가이드입니다. 한국에서 오신 것을 환영합니다. 오늘 일정에 대해 간단히 설명드리겠습니다. 먼저 숙소로 이동한 후 점심을 드시고 오후에는 다낭 시내를 둘러볼 예정입니다. 궁금한 점 있으시면 언제든지 질문해 주세요. 이제 출발하겠습니다.',
      vi: 'Xin chào mọi người, tôi là (tên) hướng dẫn viên. Chào mừng quý khách đến từ Hàn Quốc. Tôi sẽ giới thiệu ngắn gọn về lịch trình hôm nay: chúng ta sẽ về khách sạn, dùng bữa trưa và buổi chiều tham quan trung tâm Đà Nẵng. Nếu có thắc mắc, xin quý khách hãy hỏi bất cứ lúc nào. Bây giờ chúng ta sẽ khởi hành.'
    }
  }
];

let currentTopic = null;
let currentIndex = 0;
let showBack = false;

function init() {
  const topicsDiv = document.getElementById('topics');
  topics.forEach(topic => {
    const div = document.createElement('div');
    div.className = 'topic-card';
    div.onclick = () => openTopic(topic);
    div.innerHTML = '<h3>' + topic.titleVi + '</h3><p>' + topic.titleKo + '</p>';
    topicsDiv.appendChild(div);
  });
}

function openTopic(topic) {
  currentTopic = topic;
  document.getElementById('topics').style.display = 'none';
  document.getElementById('topic-section').style.display = 'block';
  document.getElementById('topic-title').innerText = topic.titleVi;
  const btnDiv = document.getElementById('topic-buttons');
  btnDiv.innerHTML = '';
  ['Phrases','Mini Script','Flashcards'].forEach(name => {
    const btn = document.createElement('div');
    btn.className = 'button';
    btn.innerText = name;
    btn.onclick = () => {
      if(name === 'Phrases') showPhrases();
      if(name === 'Mini Script') showScript();
      if(name === 'Flashcards') showFlashcards();
    };
    btnDiv.appendChild(btn);
  });
}

function showHome() {
  hideAllSections();
  document.getElementById('topics').style.display = 'block';
}

function showTopic() {
  hideAllSections();
  document.getElementById('topic-section').style.display = 'block';
}

function showPhrases() {
  hideAllSections();
  document.getElementById('phrases-section').style.display = 'block';
  const list = document.getElementById('phrase-list');
  list.innerHTML = '';
  currentTopic.phrases.forEach((phrase, idx) => {
    const li = document.createElement('li');
    li.onclick = () => openPhrase(phrase);
    // create label
    const label = document.createElement('span');
    label.className = 'label ' + 'label-' + phrase.category.toLowerCase();
    label.innerText = phrase.category;
    li.appendChild(label);
    const textContainer = document.createElement('div');
    textContainer.innerHTML = '<strong>' + phrase.ko + '</strong><br/><span>' + phrase.vi + '</span>';
    li.appendChild(textContainer);
    list.appendChild(li);
  });
  document.getElementById('phrase-detail').classList.add('hidden');
}

function openPhrase(phrase) {
  const detail = document.getElementById('phrase-detail');
  detail.innerHTML = '';
  const ko = document.createElement('p');
  ko.innerHTML = '<strong>' + phrase.ko + '</strong>';
  detail.appendChild(ko);
  const pron = document.createElement('p');
  pron.innerHTML = '<em>' + phrase.pronunciation + '</em>';
  detail.appendChild(pron);
  const vi = document.createElement('p');
  vi.innerText = phrase.vi;
  detail.appendChild(vi);
  const breakTitle = document.createElement('p');
  breakTitle.innerHTML = '<strong>Tách từ:</strong>';
  detail.appendChild(breakTitle);
  const ul = document.createElement('ul');
  phrase.breakdown.forEach(item => {
    const li = document.createElement('li');
    li.innerText = item.word + ': ' + item.meaning;
    ul.appendChild(li);
  });
  detail.appendChild(ul);
  const logic = document.createElement('p');
  logic.innerHTML = '<strong>Logic nghĩa:</strong> ' + phrase.logic;
  detail.appendChild(logic);
  if(phrase.related && phrase.related.length > 0) {
    const relTitle = document.createElement('p');
    relTitle.innerHTML = '<strong>Câu liên quan:</strong>';
    detail.appendChild(relTitle);
    const relUl = document.createElement('ul');
    phrase.related.forEach(r => {
      const li = document.createElement('li');
      li.innerText = r;
      relUl.appendChild(li);
    });
    detail.appendChild(relUl);
  }
  detail.classList.remove('hidden');
}

function showScript() {
  hideAllSections();
  document.getElementById('script-section').style.display = 'block';
  document.getElementById('script-ko').innerText = currentTopic.miniScript.ko;
  document.getElementById('script-vi').innerText = currentTopic.miniScript.vi;
}

function showFlashcards() {
  hideAllSections();
  document.getElementById('flashcard-section').style.display = 'block';
  currentIndex = 0;
  showBack = false;
  updateFlashcard();
}

function updateFlashcard() {
  const flash = document.getElementById('flashcard');
  const phrase = currentTopic.phrases[currentIndex];
  if(!showBack) {
    flash.innerHTML = '<p style="font-size:24px; margin:0;">' + phrase.ko + '</p>';
  } else {
    let html = '<p><strong>' + phrase.ko + '</strong><br/><em>' + phrase.pronunciation + '</em><br/>' + phrase.vi + '</p>';
    html += '<p><strong>Tách từ:</strong></p><ul>';
    phrase.breakdown.forEach(item => {
      html += '<li>' + item.word + ': ' + item.meaning + '</li>';
    });
    html += '</ul>';
    if(phrase.logic) html += '<p><strong>Logic:</strong> ' + phrase.logic + '</p>';
    flash.innerHTML = html;
  }
}

function toggleFlashcard() {
  showBack = !showBack;
  updateFlashcard();
}

function nextFlashcard() {
  currentIndex = (currentIndex + 1) % currentTopic.phrases.length;
  showBack = false;
  updateFlashcard();
}

function hideAllSections() {
  document.getElementById('topic-section').style.display = 'none';
  document.getElementById('phrases-section').style.display = 'none';
  document.getElementById('script-section').style.display = 'none';
  document.getElementById('flashcard-section').style.display = 'none';
}
window.onload = init;
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./service-worker.js').catch(function(err){console.log('SW fail', err);});
  });
}
</script>
</body>
