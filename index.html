<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#3b82f6" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="한국어 HDV v4" />
<meta name="mobile-web-app-capable" content="yes" />

<link rel="apple-touch-icon" href="icon-192.png" />
<title>한국어 HDV v4</title>
<style>
:root {
  --bg: #f7f8fc;
  --bg-soft: #eef3ff;
  --card: #ffffff;
  --card-2: #f8fbff;
  --text: #172033;
  --muted: #62708a;
  --line: #dfe7f3;
  --primary: #2563eb;
  --primary-soft: #eaf2ff;
  --green: #16a34a;
  --green-soft: #eaf8ef;
  --amber: #d97706;
  --amber-soft: #fff5e7;
  --red: #dc2626;
  --red-soft: #fff0f0;
  --violet: #7c3aed;
  --violet-soft: #f3edff;
  --shadow: 0 10px 30px rgba(37,99,235,.08);
  --radius: 20px;
  --radius-sm: 14px;
}
body.dark {
  --bg: #0f172a;
  --bg-soft: #12203c;
  --card: #111c34;
  --card-2: #142340;
  --text: #f4f7ff;
  --muted: #9fb0d3;
  --line: rgba(255,255,255,.09);
  --primary: #60a5fa;
  --primary-soft: rgba(96,165,250,.15);
  --green: #4ade80;
  --green-soft: rgba(74,222,128,.14);
  --amber: #fbbf24;
  --amber-soft: rgba(251,191,36,.14);
  --red: #f87171;
  --red-soft: rgba(248,113,113,.12);
  --violet: #a78bfa;
  --violet-soft: rgba(167,139,250,.14);
  --shadow: 0 10px 30px rgba(0,0,0,.28);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body {
  font-family: Inter, "Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,Segoe UI,sans-serif;
  background: linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 180px);
  color: var(--text);
  min-height: 100vh;
}
button,input{font:inherit}
.header {
  position: sticky; top:0; z-index:50;
  backdrop-filter: blur(10px);
  background: color-mix(in srgb, var(--bg) 82%, transparent);
  border-bottom:1px solid var(--line);
}
.wrap{max-width:1080px;margin:0 auto;padding:16px}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.brand{display:flex;gap:12px;align-items:flex-start}
.logo {
  width:48px;height:48px;border-radius:16px;
  display:grid;place-items:center;
  background: linear-gradient(135deg, #ef4444, #2563eb);
  color:#fff;font-size:24px;font-weight:800;
  box-shadow: var(--shadow);
}
.title{font-size:24px;font-weight:800;line-height:1.1}
.subtitle{font-size:13px;color:var(--muted);margin-top:4px}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
.pill {
  border:1px solid var(--line); background:var(--card);
  color:var(--text); border-radius:999px; padding:8px 12px;
  display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:600;
}
.pill.primary{background:var(--primary-soft);color:var(--primary);border-color:transparent}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
.tab {
  border:1px solid var(--line); background:var(--card); color:var(--muted);
  border-radius:16px; padding:12px 10px; font-weight:700; cursor:pointer;
}
.tab.active{background:var(--primary);color:#fff;border-color:transparent}
.main{max-width:1080px;margin:0 auto;padding:20px 16px 56px}
.panel {
  background:var(--card); border:1px solid var(--line);
  border-radius:var(--radius); box-shadow:var(--shadow);
}
.controls{padding:16px;display:grid;gap:14px}
.search {
  width:100%; padding:14px 16px; border-radius:14px; border:1px solid var(--line);
  background:var(--card-2); color:var(--text);
}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.chip {
  border:1px solid var(--line); background:var(--card);
  color:var(--muted); border-radius:999px; padding:9px 14px; cursor:pointer;
  font-size:13px; font-weight:700;
}
.chip.active{background:var(--primary-soft); color:var(--primary); border-color:transparent}
.summary {
  display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; padding:0 16px 16px;
}
.kpi {
  background:var(--card-2); border:1px solid var(--line); border-radius:16px; padding:14px;
}
.kpi .n{font-size:26px;font-weight:800}
.kpi .l{font-size:12px;color:var(--muted);margin-top:4px}
.smart-box {
  margin:0 16px 16px; padding:14px 16px; border-radius:16px;
  background:linear-gradient(135deg, var(--primary-soft), color-mix(in srgb, var(--primary-soft) 60%, var(--card)));
  border:1px solid color-mix(in srgb, var(--primary) 20%, var(--line));
}
.smart-title{font-weight:800; margin-bottom:6px}
.smart-desc{font-size:14px; color:var(--muted); line-height:1.6}
.card-list{display:grid; gap:14px; padding:0 16px 16px}
.flip-card {
  perspective: 1300px;
}
.flip-inner {
  position:relative; min-height:260px; transform-style:preserve-3d; transition:transform .55s ease;
}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.face {
  position:absolute; inset:0; backface-visibility:hidden;
  background:var(--card); border:1px solid var(--line); border-radius:18px; overflow:hidden;
}
.face.back{transform:rotateY(180deg)}
.card-body{padding:18px}
.meta-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.meta-left{display:flex;gap:12px;align-items:center}
.rank {
  width:40px;height:40px;border-radius:14px; display:grid; place-items:center;
  background:var(--primary-soft); color:var(--primary); font-weight:800;
}
.badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{font-size:12px;padding:6px 10px;border-radius:999px;font-weight:800}
.badge.core{background:var(--green-soft);color:var(--green)}
.badge.common{background:var(--primary-soft);color:var(--primary)}
.badge.rare{background:var(--amber-soft);color:var(--amber)}
.badge.theme{background:var(--violet-soft);color:var(--violet)}
.badge.status-known{background:var(--amber-soft);color:var(--amber)}
.badge.status-mastered{background:var(--green-soft);color:var(--green)}
.ko{font-size:30px;font-weight:900;line-height:1.22;margin:16px 0 8px}
.roman{font-size:13px;color:var(--muted);font-style:italic}
.vi{font-size:16px;line-height:1.6;margin-top:10px}
.tiny{font-size:12px;color:var(--muted)}
.action-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.btn {
  border:none; border-radius:14px; padding:12px 14px; cursor:pointer; font-weight:800;
}
.btn.primary{background:var(--primary);color:#fff}
.btn.soft{background:var(--card-2);border:1px solid var(--line);color:var(--text)}
.btn.green{background:var(--green-soft); color:var(--green)}
.btn.amber{background:var(--amber-soft); color:var(--amber)}
.btn.red{background:var(--red-soft); color:var(--red)}
.tip {
  margin-top:14px; padding:12px 14px; border-radius:14px; background:var(--amber-soft); color:var(--amber);
  font-size:14px; line-height:1.6; border:1px solid color-mix(in srgb, var(--amber) 22%, transparent);
}
.back-grid{display:grid; grid-template-columns:1.25fr .95fr; gap:14px}
.block {
  background:var(--card-2); border:1px solid var(--line); border-radius:16px; padding:14px;
}
.block h4{margin:0 0 10px;font-size:14px}
.note {
  background:var(--primary-soft); color:var(--primary);
  padding:12px 14px; border-radius:14px; font-size:14px; line-height:1.6;
}
.words{display:grid; gap:10px}
.word {
  display:grid; grid-template-columns:1.1fr 1.2fr .8fr; gap:10px; align-items:start;
  padding:12px; border-radius:14px; background:var(--card); border:1px solid var(--line); cursor:pointer;
}
.word strong{display:block;font-size:15px}
.word .m{font-size:13px;color:var(--muted);line-height:1.5}
.word .t{justify-self:start;padding:6px 10px;border-radius:999px;font-size:11px;font-weight:800}
.t-hh{background:var(--primary-soft);color:var(--primary)}
.t-th{background:var(--green-soft);color:var(--green)}
.t-nl{background:var(--violet-soft);color:var(--violet)}
.t-kg{background:var(--amber-soft);color:var(--amber)}
.example{font-size:14px;line-height:1.7}
.example .koe{font-weight:800;color:var(--text)}
.example .vie{color:var(--muted);margin-top:6px}
.list-empty{padding:26px 16px;color:var(--muted);text-align:center}
.focus-wrap{padding:18px}
.focus-card{padding:22px;display:grid;gap:16px}
.focus-box{min-height:320px}
.focus-nav{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
.quiz-wrap,.stats-wrap{padding:16px}
.quiz-card{padding:18px;display:grid;gap:14px}
.quiz-ask{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.quiz-ko{font-size:34px;font-weight:900;line-height:1.25}
.quiz-opt{width:100%;text-align:left;border:1px solid var(--line);background:var(--card-2);padding:14px 16px;border-radius:14px;cursor:pointer;color:var(--text);font-weight:700}
.quiz-opt.correct{background:var(--green-soft);border-color:transparent;color:var(--green)}
.quiz-opt.wrong{background:var(--red-soft);border-color:transparent;color:var(--red)}
.quiz-opt.reveal{outline:2px solid color-mix(in srgb, var(--green) 40%, transparent)}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.stat-box{background:var(--card-2);border:1px solid var(--line);border-radius:16px;padding:16px}
.stat-box .big{font-size:30px;font-weight:900}
.progress{height:10px;background:var(--bg-soft);border-radius:999px;overflow:hidden}
.progress > div{height:100%;background:linear-gradient(90deg,var(--green),var(--primary));border-radius:999px}
.footer-note{font-size:13px;color:var(--muted);line-height:1.7}
.hidden{display:none !important}
@media (max-width: 880px) {
  .summary,.grid3{grid-template-columns:repeat(2,minmax(0,1fr))}
  .back-grid{grid-template-columns:1fr}
}
@media (max-width: 640px) {
  .wrap,.main{padding-left:12px;padding-right:12px}
  .tabs{grid-template-columns:repeat(2,1fr)}
  .summary,.grid2,.grid3{grid-template-columns:1fr}
  .ko,.quiz-ko{font-size:24px}
  .word{grid-template-columns:1fr;}
  .header-top{align-items:stretch}
}
</style>
</head>

let koVoice = null;
function loadVoice(){
  const voices = speechSynthesis.getVoices();
  const pref = ['Yuna','Google 한국의','Microsoft Heami','Microsoft SunHi'];
  koVoice = pref.map(n => voices.find(v => v.name.includes(n))).find(Boolean) || voices.find(v => v.lang && v.lang.startsWith('ko')) || null;
}
speechSynthesis.onvoiceschanged = loadVoice; loadVoice(); setTimeout(loadVoice, 300);

function speak(text, rate=0.9){
  if(!text) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR';
  u.rate = rate;
  if(koVoice) u.voice = koVoice;
  speechSynthesis.speak(u);
}

    const st = phraseStatus(p);
    const okStatus = STATE.statusFilter === 'Tất cả' ? true : st === STATE.statusFilter;
    const okSearch = !q || [p.ko, p.roman, p.vi, p.theme, p.usage, p.hanja, ...(p.chunks||[]).map(c => c.text + ' ' + c.meaning)].join(' ').toLowerCase().includes(q);
    return okUsage && okTheme && okStatus && okSearch;
  });
}

function switchTab(tab){
  STATE.tab = tab; saveState();
  ['learn','focus','quiz','stats'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t !== tab);
    document.querySelector(`.tab[data-tab="${t}"]`).classList.toggle('active', t === tab);
  });
  if(tab === 'learn') renderLearn();
  if(tab === 'focus') renderFocus();
  if(tab === 'quiz') renderQuiz();
  if(tab === 'stats') renderStats();
}
function toggleTheme(){
  STATE.themeMode = STATE.themeMode === 'dark' ? 'light' : 'dark';
  saveState(); applyTheme();
}
function setUsage(v){ STATE.usage = v; saveState(); renderLearn(); }
function setTheme(v){ STATE.theme = v; saveState(); renderLearn(); }
function setStatusFilter(v){ STATE.statusFilter = v; saveState(); renderLearn(); }
function setSearch(v){ STATE.search = v; renderLearn(); }

function markKnown(id){
  STATE.known[id] = true;
  delete STATE.mastered[id];
  saveState();
  render();
}
function markMastered(id){
  STATE.mastered[id] = true;
  delete STATE.known[id];
  STATE.scores[id] = Math.max(STATE.scores[id] || 0, 7);
  saveState();
  render();
}
function resetOne(id){
  delete STATE.known[id];
  delete STATE.mastered[id];
  delete STATE.scores[id];
  saveState();
  render();
}

function flipCard(id, force){
  const box = document.getElementById('flip-' + id);
  if(!box) return;
  const willFlip = typeof force === 'boolean' ? force : !box.classList.contains('flipped');
  box.classList.toggle('flipped', willFlip);
  if(willFlip && STATE.autoSpeak){
    const item = DATA.find(x => x.id === id);
    if(item) speak(item.ko, 0.88);
  }
}

function renderLearn(){
  const el = document.getElementById('tab-learn');
  const filtered = getFilteredData();
  const total = DATA.length;
  const core = DATA.filter(x => x.usage === 'Cốt lõi').length;
  const common = DATA.filter(x => x.usage === 'Thông dụng').length;
  const rare = DATA.filter(x => x.usage === 'Ít dùng').length;
  const mastered = Object.keys(STATE.mastered).length;
  const top5 = DATA.filter(x => !STATE.mastered[x.id]).slice(0,5);

  let html = `
    <div class="controls">
      <input class="search" placeholder="Tìm theo tiếng Hàn, nghĩa Việt, chủ đề..." value="${escapeHtml(STATE.search)}" oninput="setSearch(this.value)" />
      <div>
        <div class="tiny" style="margin-bottom:8px;font-weight:800">Mức độ ưu tiên</div>
        <div class="row">
          ${USAGES.map(u => `<button class="chip ${STATE.usage===u?'active':''}" onclick="setUsage('${escapeAttr(u)}')">${u}</button>`).join('')}
        </div>
      </div>
      <div>
        <div class="tiny" style="margin-bottom:8px;font-weight:800">Chủ đề</div>
        <div class="row">
          ${THEMES.map(t => `<button class="chip ${STATE.theme===t?'active':''}" onclick="setTheme('${escapeAttr(t)}')">${t}</button>`).join('')}
        </div>
      </div>
      <div>
        <div class="tiny" style="margin-bottom:8px;font-weight:800">Trạng thái</div>
        <div class="row">
          ${STATUS_FILTERS.map(s => `<button class="chip ${STATE.statusFilter===s?'active':''}" onclick="setStatusFilter('${escapeAttr(s)}')">${s}</button>`).join('')}
          <button class="chip ${STATE.autoSpeak?'active':''}" onclick="STATE.autoSpeak=!STATE.autoSpeak;saveState();renderLearn()">🔊 Tự phát âm khi lật: ${STATE.autoSpeak?'Bật':'Tắt'}</button>
        </div>
      </div>
    </div>

    <div class="summary">
      <div class="kpi"><div class="n">${core}</div><div class="l">Cốt lõi</div></div>
      <div class="kpi"><div class="n">${common}</div><div class="l">Thông dụng</div></div>
      <div class="kpi"><div class="n">${rare}</div><div class="l">Ít dùng</div></div>
      <div class="kpi"><div class="n">${mastered}</div><div class="l">Đã thạo / ${total}</div></div>
    </div>

    <div class="smart-box">
      <div class="smart-title">🧭 V4 học theo logic mới</div>
      <div class="smart-desc">
        App đã đổi sang <b>học cụm phổ biến trước</b>, rồi mới tới cụm thuyết minh sâu. 
        Nhấn vào card để lật sang <b>mặt sau</b>: xem nghĩa từng khối từ, phân loại <b>Hán-Hàn / Thuần Hàn / Ngoại lai / Kính ngữ</b>, và app sẽ tự đọc cụm từ để dễ nhớ hơn.
      </div>
    </div>

    <div class="smart-box" style="background:linear-gradient(135deg,var(--green-soft), color-mix(in srgb,var(--green-soft) 70%, var(--card)));border-color:color-mix(in srgb, var(--green) 18%, var(--line));">
      <div class="smart-title">⭐ 5 cụm nên học trước hôm nay</div>
      <div class="smart-desc">${top5.map(p => `${p.rank}. ${escapeHtml(p.ko)}`).join('<br>')}</div>
    </div>

    <div class="card-list">
  `;

  if(!filtered.length){
    html += `<div class="list-empty">Không tìm thấy cụm phù hợp với bộ lọc hiện tại.</div>`;
  } else {
    html += filtered.map(p => {
      const st = phraseStatus(p);
      const statusBadge = st === 'Đã thạo'
        ? `<span class="badge status-mastered">★ Đã thạo</span>`
        : st === 'Đã biết'
          ? `<span class="badge status-known">✓ Đã biết</span>`
          : ``;
      const usageCls = p.usage === 'Cốt lõi' ? 'core' : p.usage === 'Thông dụng' ? 'common' : 'rare';
      const resetBtn = st !== 'Chưa học'
        ? `<button class="btn red" onclick="event.stopPropagation(); resetOne('${p.id}')">Bỏ đánh dấu</button>`
        : ``;
      return `
      <div class="flip-card" id="flip-${p.id}">
        <div class="flip-inner">
          <div class="face front">
            <div class="card-body">
              <div class="meta-top">
                <div class="meta-left">
                  <div class="rank">#${p.rank}</div>
                  <div class="badges">
                    <span class="badge ${usageCls}">${p.usage}</span>
                    <span class="badge theme">${escapeHtml(p.theme)}</span>
                    ${statusBadge}
                  </div>
                </div>
              </div>
              <div class="ko">${escapeHtml(p.ko)}</div>
              <div class="roman">${escapeHtml(p.roman)}</div>
              <div class="vi">${escapeHtml(p.vi)}</div>
              <div class="tip">💡 ${escapeHtml(p.tip)}</div>
              <div class="action-row">
                <button class="btn soft" onclick="event.stopPropagation(); speak('${escapeJs(p.ko)}', 0.62)">🔊 Chậm</button>
                <button class="btn soft" onclick="event.stopPropagation(); speak('${escapeJs(p.ko)}', 0.9)">▶ Nghe</button>
                <button class="btn primary" onclick="event.stopPropagation(); flipCard('${p.id}', true)">Lật mặt sau</button>
                <button class="btn amber" onclick="event.stopPropagation(); markKnown('${p.id}')">Đã biết</button>
                <button class="btn green" onclick="event.stopPropagation(); markMastered('${p.id}')">Đã thạo</button>
                ${resetBtn}
              </div>
            </div>
          </div>
          <div class="face back">
            <div class="card-body">
              <div class="meta-top">
                <div class="badges">
                  <span class="badge ${usageCls}">${p.usage}</span>
                  <span class="badge theme">${escapeHtml(p.theme)}</span>
                  <span class="badge theme">${escapeHtml(p.phraseType)}</span>
                </div>
                <button class="btn soft" onclick="event.stopPropagation(); flipCard('${p.id}', false)">↩ Mặt trước</button>
              </div>
              <div class="back-grid" style="margin-top:14px">
                <div class="block">
                  <h4>🧩 Nghĩa từng khối từ (nhấn vào từng dòng để nghe)</h4>
                  <div class="words">
                    ${(p.chunks||[]).map(c => `
                      <div class="word" onclick="event.stopPropagation(); speak('${escapeJs(c.text)}',0.85)">
                        <div><strong>${escapeHtml(c.text)}</strong></div>
                        <div class="m">${escapeHtml(c.meaning)}</div>
                        <div><span class="t ${typeClass(c.type)}">${escapeHtml(c.type)}</span><div class="tiny" style="margin-top:8px">${escapeHtml(c.hint || '')}</div></div>
                      </div>
                    `).join('')}
                  </div>
                </div>
                <div style="display:grid; gap:14px">
                  <div class="block">
                    <h4>🈶 Gốc Hán-Hàn / Hán-Việt</h4>
                    <div class="note">${escapeHtml(p.hanja)}</div>
                  </div>
                  <div class="block">
                    <h4>🗣 Ví dụ thực chiến</h4>
                    <div class="example">
                      <div class="koe">${escapeHtml(p.ex.ko)}</div>
                      <div class="vie">→ ${escapeHtml(p.ex.vi)}</div>
                    </div>
                    <div class="action-row" style="margin-top:12px">
                      <button class="btn soft" onclick="event.stopPropagation(); speak('${escapeJs(p.ko)}',0.85)">🔊 Cụm từ</button>
                      <button class="btn soft" onclick="event.stopPropagation(); speak('${escapeJs(p.ex.ko)}',0.85)">🎧 Câu ví dụ</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  html += `</div>`;
  el.innerHTML = html;

  document.querySelectorAll('#tab-learn .face.front').forEach(face => {
    face.addEventListener('click', (e) => {
      if(e.target.closest('button')) return;
      const card = face.closest('.flip-card');
      if(card) flipCard(card.id.replace('flip-',''), true);
    });
  });
  document.querySelectorAll('#tab-learn .face.back').forEach(face => {
    face.addEventListener('click', (e) => {
      if(e.target.closest('button') || e.target.closest('.word')) return;
      const card = face.closest('.flip-card');
      if(card) flipCard(card.id.replace('flip-',''), false);
    });
  });
}

function getReviewPool(){
  const filtered = getFilteredData();
  return filtered.length ? filtered : DATA;
}
function renderFocus(){
  const el = document.getElementById('tab-focus');
  const pool = getReviewPool();
  if(STATE.focusIndex >= pool.length) STATE.focusIndex = 0;
  const p = pool[STATE.focusIndex];
  if(!p){
    el.innerHTML = `<div class="focus-wrap"><div class="list-empty">Chưa có dữ liệu để ôn.</div></div>`;
    return;
  }
  const status = phraseStatus(p);
  const score = STATE.scores[p.id] || 0;
  el.innerHTML = `
    <div class="focus-wrap">
      <div class="smart-box" style="margin:0 0 16px">
        <div class="smart-title">🧠 Ôn nhanh 1 thẻ / 1 lần</div>
        <div class="smart-desc">Chế độ này giúp học sâu từng cụm: nghe → đoán nghĩa → lật → tự chấm nhớ.</div>
      </div>
      <div class="flip-card focus-box" id="flip-${p.id}-focus">
        <div class="flip-inner">
          <div class="face front">
            <div class="focus-card">
              <div class="badges">
                <span class="badge ${p.usage==='Cốt lõi'?'core':p.usage==='Thông dụng'?'common':'rare'}">${p.usage}</span>
                <span class="badge theme">${escapeHtml(p.theme)}</span>
                <span class="badge theme">Điểm nhớ: ${score}</span>
                ${status !== 'Chưa học' ? `<span class="badge status-known">${status}</span>` : ``}
              </div>
              <div class="ko">${escapeHtml(p.ko)}</div>
              <div class="roman">${escapeHtml(p.roman)}</div>
              <div class="action-row">
                <button class="btn soft" onclick="speak('${escapeJs(p.ko)}',0.62)">🔊 Chậm</button>
                <button class="btn soft" onclick="speak('${escapeJs(p.ko)}',0.9)">▶ Nghe</button>
                <button class="btn primary" onclick="flipFocus(true)">Lật nghĩa</button>
              </div>
            </div>
          </div>
          <div class="face back">
            <div class="focus-card">
              <div class="vi">${escapeHtml(p.vi)}</div>
              <div class="note">${escapeHtml(p.hanja)}</div>
              <div class="example"><div class="koe">${escapeHtml(p.ex.ko)}</div><div class="vie">→ ${escapeHtml(p.ex.vi)}</div></div>
              <div class="action-row">
                <button class="btn red" onclick="rateFocus(-2)">😵 Quên</button>
                <button class="btn amber" onclick="rateFocus(0)">🤔 Hơi nhớ</button>
                <button class="btn green" onclick="rateFocus(2)">😎 Nhớ chắc</button>
                <button class="btn soft" onclick="markKnown('${p.id}')">Đã biết</button>
                <button class="btn soft" onclick="markMastered('${p.id}')">Đã thạo</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="focus-nav" style="margin-top:14px">
        <button class="btn soft" onclick="moveFocus(-1)">← Trước</button>
        <div class="pill">${STATE.focusIndex+1} / ${pool.length}</div>
        <button class="btn soft" onclick="moveFocus(1)">Sau →</button>
      </div>
    </div>
  `;
  const front = el.querySelector('.face.front');
  if(front){
    front.addEventListener('click', e => {
      if(e.target.closest('button')) return;
      flipFocus(true);
    });
  }
}
function flipFocus(on){
  const pool = getReviewPool();
  const p = pool[STATE.focusIndex];
  const box = document.getElementById(`flip-${p.id}-focus`);
  if(!box) return;
  box.classList.toggle('flipped', on);
  if(on && STATE.autoSpeak) speak(p.ko, 0.88);
}
function moveFocus(dir){
  const pool = getReviewPool();
  STATE.focusIndex = (STATE.focusIndex + dir + pool.length) % pool.length;
  saveState(); renderFocus();
}
function rateFocus(delta){
  const pool = getReviewPool(); const p = pool[STATE.focusIndex];
  STATE.scores[p.id] = Math.max(0, Math.min(10, (STATE.scores[p.id] || 0) + delta));
  saveState();
  moveFocus(1);
}

let CURRENT_QUIZ = null;
function renderQuiz(){
  const el = document.getElementById('tab-quiz');
  const pool = DATA.filter(p => phraseStatus(p) !== 'Đã thạo');
  if(pool.length < 4){
    el.innerHTML = `<div class="quiz-wrap"><div class="list-empty">Cần ít nhất 4 cụm chưa thạo để làm quiz.</div></div>`;
    return;
  }
  const weighted = [...pool].sort((a,b) => (STATE.scores[a.id]||0) - (STATE.scores[b.id]||0));
  const correct = weighted[Math.floor(Math.random() * Math.min(12, weighted.length))];
  const wrongs = DATA.filter(p => p.id !== correct.id).sort(() => Math.random() - 0.5).slice(0,3);
  const opts = [correct, ...wrongs].sort(() => Math.random() - 0.5);
  const audioMode = Math.random() < 0.35;
  CURRENT_QUIZ = {correct, opts, answered:false};

  const acc = STATE.quiz.total ? Math.round(STATE.quiz.correct / STATE.quiz.total * 100) : 0;
  el.innerHTML = `
    <div class="quiz-wrap">
      <div class="grid3" style="margin-bottom:16px">
        <div class="stat-box"><div class="big">${STATE.quiz.total}</div><div class="tiny">Tổng câu</div></div>
        <div class="stat-box"><div class="big">${acc}%</div><div class="tiny">Chính xác</div></div>
        <div class="stat-box"><div class="big">🔥${STATE.quiz.streak}</div><div class="tiny">Streak</div></div>
      </div>
      <div class="quiz-card">
        <div class="quiz-ask">${audioMode ? 'Nghe rồi chọn nghĩa đúng' : 'Nhìn cụm từ rồi chọn nghĩa đúng'}</div>
        ${audioMode ? `
          <div class="quiz-ko">🔊</div>
          <div class="action-row"><button class="btn primary" onclick="speak('${escapeJs(correct.ko)}',0.9)">Phát âm lại</button></div>
        ` : `
          <div class="quiz-ko">${escapeHtml(correct.ko)}</div>
          <div class="roman">${escapeHtml(correct.roman)}</div>
          <div class="action-row"><button class="btn soft" onclick="speak('${escapeJs(correct.ko)}',0.9)">▶ Nghe</button></div>
        `}
        <div style="display:grid;gap:10px">
          ${opts.map((o,i)=>`<button class="quiz-opt" id="q-${i}" onclick="answerQuiz(${i}, '${o.id}')">${escapeHtml(o.vi)}</button>`).join('')}
        </div>
      </div>
    </div>
  `;
  if(audioMode) setTimeout(() => speak(correct.ko, 0.86), 350);
}
function answerQuiz(i, id){
  if(!CURRENT_QUIZ || CURRENT_QUIZ.answered) return;
  CURRENT_QUIZ.answered = true;
  const ok = id === CURRENT_QUIZ.correct.id;
  STATE.quiz.total += 1;
  if(ok){
    STATE.quiz.correct += 1;
    STATE.quiz.streak += 1;
    STATE.quiz.best = Math.max(STATE.quiz.best || 0, STATE.quiz.streak);
    STATE.scores[CURRENT_QUIZ.correct.id] = Math.min(10, (STATE.scores[CURRENT_QUIZ.correct.id] || 0) + 1);
    document.getElementById('q-'+i).classList.add('correct');
  } else {
    STATE.quiz.streak = 0;
    STATE.scores[CURRENT_QUIZ.correct.id] = Math.max(0, (STATE.scores[CURRENT_QUIZ.correct.id] || 0) - 1);
    document.getElementById('q-'+i).classList.add('wrong');
    CURRENT_QUIZ.opts.forEach((o,idx) => {
      if(o.id === CURRENT_QUIZ.correct.id) document.getElementById('q-'+idx).classList.add('reveal','correct');
    });
  }
  saveState();
  const btn = document.createElement('button');
  btn.className = 'btn primary';
  btn.textContent = ok ? '✓ Câu tiếp theo' : '↺ Câu tiếp theo';
  btn.onclick = renderQuiz;
  document.querySelector('#tab-quiz .quiz-card').appendChild(btn);
}

function exportProgress(){
  const raw = JSON.stringify(STATE);
  navigator.clipboard.writeText(raw).then(() => alert('Đã copy mã sao lưu tiến độ.'));
}
function renderStats(){
  const el = document.getElementById('tab-stats');
  const total = DATA.length;
  const known = Object.keys(STATE.known).length;
  const mastered = Object.keys(STATE.mastered).length;
  const untouched = total - known - mastered;
  const coreTotal = DATA.filter(p=>p.usage==='Cốt lõi').length;
  const commonTotal = DATA.filter(p=>p.usage==='Thông dụng').length;
  const rareTotal = DATA.filter(p=>p.usage==='Ít dùng').length;
  const coreMastered = DATA.filter(p => p.usage==='Cốt lõi' && STATE.mastered[p.id]).length;
  const commonMastered = DATA.filter(p => p.usage==='Thông dụng' && STATE.mastered[p.id]).length;
  const rareMastered = DATA.filter(p => p.usage==='Ít dùng' && STATE.mastered[p.id]).length;
  const acc = STATE.quiz.total ? Math.round(STATE.quiz.correct / STATE.quiz.total * 100) : 0;
  const weak = [...DATA].filter(p => !STATE.mastered[p.id]).sort((a,b) => (STATE.scores[a.id]||0) - (STATE.scores[b.id]||0)).slice(0,6);

  el.innerHTML = `
    <div class="stats-wrap">
      <div class="grid2">
        <div class="stat-box"><div class="big">${mastered}</div><div class="tiny">Đã thạo</div></div>
        <div class="stat-box"><div class="big">${known}</div><div class="tiny">Đã biết</div></div>
        <div class="stat-box"><div class="big">${untouched}</div><div class="tiny">Chưa học</div></div>
        <div class="stat-box"><div class="big">${acc}%</div><div class="tiny">Độ chính xác Quiz</div></div>
      </div>

      <div class="stat-box" style="margin-top:16px">
        <div class="tiny" style="margin-bottom:8px;font-weight:800">Tiến độ theo mức độ phổ biến</div>
        <div class="tiny">Cốt lõi: ${coreMastered} / ${coreTotal}</div>
        <div class="progress"><div style="width:${Math.round(coreMastered / coreTotal * 100)}%"></div></div>
        <div class="tiny" style="margin:10px 0 8px;font-weight:800">Thông dụng: ${commonMastered} / ${commonTotal}</div>
        <div class="progress"><div style="width:${Math.round(commonMastered / commonTotal * 100)}%"></div></div>
        <div class="tiny" style="margin:10px 0 8px;font-weight:800">Ít dùng: ${rareMastered} / ${rareTotal}</div>
        <div class="progress"><div style="width:${Math.round(rareMastered / rareTotal * 100)}%"></div></div>
      </div>

      <div class="stat-box" style="margin-top:16px">
        <div class="tiny" style="margin-bottom:10px;font-weight:800">Cụm yếu nhất - nên ôn lại</div>
        <div class="row" style="align-items:stretch;flex-direction:column">
          ${weak.map(p => `<div class="block"><div style="font-weight:800">${escapeHtml(p.ko)}</div><div class="tiny" style="margin-top:6px">${escapeHtml(p.vi)}</div></div>`).join('')}
        </div>
      </div>

      <div class="stat-box" style="margin-top:16px">
        <div class="tiny" style="margin-bottom:10px;font-weight:800">Tiện ích thông minh</div>
        <div class="action-row">
          <button class="btn soft" onclick="exportProgress()">📋 Sao lưu tiến độ</button>
          <button class="btn soft" onclick="STATE.known={};STATE.mastered={};STATE.scores={};saveState();render()">↩ Xóa đánh dấu</button>
          <button class="btn red" onclick="if(confirm('Xóa toàn bộ dữ liệu học v4?')){ localStorage.removeItem(STORE_KEY); location.reload(); }">🗑 Reset v4</button>
        </div>
        <div class="footer-note" style="margin-top:12px">
          V4 đã đổi logic học theo 3 tầng: <b>Cốt lõi → Thông dụng → Ít dùng</b>. 
          Cách này khoa học hơn vì giúp nhớ chắc phần dùng hằng ngày trước, rồi mới mở rộng sang thuyết minh sâu và các câu ít gặp.
        </div>
      </div>
    </div>
  `;
}

function render(){
  renderLearn();
  renderFocus();
  renderQuiz();
  renderStats();
  switchTab(STATE.tab);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', ()=> navigator.serviceWorker.register('./service-worker.js'));
}
render();
</script>
</body>
</html>
