<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>K-Tour Guide v6</title>
  <meta name="theme-color" content="#2563EB">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="top-shell">
      <div class="brand-row">
        <div>
          <p class="brand-title">한국어 HDV v6</p>
          <p class="brand-sub">Học mỗi ngày · Nhớ nhanh · Dẫn tour tự tin</p>
        </div>
        <span class="clock-badge" id="clockBadge">--:--</span>
      </div>
      <nav class="top-tabs" aria-label="Điều hướng học">
        <button class="tab active" type="button" data-view="learn">Học</button>
        <button class="tab" type="button" data-view="quiz">Quiz</button>
        <button class="tab" type="button" data-view="review">Ôn tập</button>
        <button class="tab" type="button" data-view="stats">Thống kê</button>
      </nav>
    </section>

    <section class="dashboard-card" aria-live="polite">
      <h2>Hành trình hôm nay</h2>
      <div class="dashboard-grid">
        <article><p>Tiến độ hôm nay</p><strong id="todayLearned">0 từ</strong></article>
        <article><p>Streak</p><strong id="streakCount">0 ngày</strong></article>
        <article><p>Điểm tích lũy</p><strong id="totalPoints">0 điểm</strong></article>
        <article><p>Mục tiêu ngày</p><strong id="dailyGoal">0%</strong></article>
      </div>
      <div class="goal-track"><div class="goal-bar" id="goalBar"></div></div>
    </section>

    <section class="schedule-card" aria-live="polite">
      <h2>Khung giờ học</h2>
      <div id="studySlots" class="study-slots"></div>
    </section>

    <nav class="top-nav">
      <button class="nav-tab active" data-view="learn">Học</button>
      <button class="nav-tab" data-view="quiz">Quiz</button>
      <button class="nav-tab" data-view="review">Ôn tập</button>
      <button class="nav-tab" data-view="stats">Thống kê</button>
      <button class="nav-tab" data-view="settings">Cài đặt</button>
    </nav>

      <div class="filter-row">
        <select id="topicFilter" aria-label="Lọc theo chủ đề"></select>
        <button id="randomBtn" class="btn ghost" type="button">Ngẫu nhiên</button>
      </div>

      <div class="quick-row">
        <button id="allBtn" class="chip active" type="button">Tất cả</button>
        <button id="favoriteBtn" class="chip" type="button">Yêu thích</button>
        <button id="hardBtn" class="chip" type="button">Khó</button>
      </div>
    </section>

    <section id="sessionPanel" class="session-panel"></section>

    <section id="progressPanel" class="progress">
      <strong id="progressText">0/0 đã học</strong>
      <div class="track"><div id="progressBar"></div></div>
      <p id="statsText">Yêu thích: 0 · Khó: 0</p>
    </section>

    <section id="viewRoot"></section>

    <template id="cardTemplate">
      <article class="flashcard">
        <div class="card-top">
          <span class="topic-pill"></span>
          <div class="card-status-badge"></div>
          <button class="favorite-toggle" type="button" aria-label="Đánh dấu yêu thích">☆</button>
        </div>

        <div class="flip-shell" role="button" tabindex="0" aria-label="Chạm để lật flashcard">
          <section class="flashcard-face flashcard-front">
            <div class="semantic-image" aria-hidden="true"></div>
            <p class="ko"></p>
            <p class="roman"></p>
            <p class="vi"></p>

            <div class="front-action-grid">
              <button class="speak-btn btn-hear" data-rate="1" type="button">Nghe</button>
              <button class="speak-btn btn-hear-slow" data-rate="0.75" type="button">Nghe chậm</button>
              <button class="record-btn btn-record" type="button">Ghi âm</button>
              <button class="play-record-btn btn-playmine" type="button">Nghe giọng tôi</button>
            </div>

            <button class="learned-btn complete-btn" type="button">✅ Hoàn thành thẻ</button>

            <div class="flip-bar-wrap">
              <button class="flip-btn flip-bar" type="button">Lật thẻ để xem phân tích</button>
            </div>
          </section>

          <section class="flashcard-face flashcard-back">
            <div class="back-head">
              <button class="flip-btn" type="button">Quay lại mặt trước</button>
            </div>

            <div class="analysis-summary">
              <p class="natural-meaning"></p>
            </div>

            <div class="analysis-list"></div>

            <ul class="similar-list"></ul>

            <div class="back-tools">
              <button class="hard-btn" type="button">Đánh dấu khó</button>
              <button class="stop-record-btn" type="button" disabled>Dừng ghi</button>
              <button class="delete-record-btn" type="button">Xóa ghi âm</button>
            </div>
            <p class="record-status">Chưa có bản ghi âm cá nhân.</p>
          </section>
        </div>
        <div class="quiz-options" data-quiz-options></div>
        <p class="quiz-result" data-quiz-result></p>
        <button class="quiz-next" data-quiz-next>Câu tiếp</button>
      </article>
    </template>
  </main>

  <script src="phrases.js"></script>
  <script src="app.js"></script>
</body>
</html>
