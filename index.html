function populateTopics() {
  const select = document.getElementById('topicSelect');
  for (const topic in DB) {
    const option = document.createElement('option');
    option.value = topic;
    option.textContent = topic;
    select.appendChild(option);
  }
}
function showPhrases(topic) {
  const container = document.getElementById('phrases');
  container.innerHTML = '';
  if (!topic || !DB[topic]) return;
  DB[topic].forEach(p => {
    const card = document.createElement('div');
    card.className = 'phrase';
    const title = document.createElement('div');
    title.className = 'phrase-title';
    title.textContent = `${p.ko} — ${p.vi}`;
    const details = document.createElement('div');
    details.className = 'phrase-details';
    details.innerHTML = `<b>Phiên âm:</b> ${p.roman}<br><b>Cấp độ:</b> ${p.level} | <b>Sử dụng:</b> ${p.usage}<br><b>Loại từ:</b> ${p.type}<br>` +
      (p.root ? `<b>Từ gốc:</b> ${p.root}<br>` : '') +
      `<b>Giải thích:</b> ${p.formation}<br><b>Ví dụ:</b> ${p.example}<br><b>Mẹo:</b> ${p.tip}`;
    title.onclick = () => {
      details.style.display = details.style.display === 'none' ? 'block' : 'none';
    };
    card.appendChild(title);
    card.appendChild(details);
    container.appendChild(card);
  });
}
window.onload = populateTopics;
